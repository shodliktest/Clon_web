<!DOCTYPE html>
<html lang="uz" data-theme="light" style="background:#F5F3FF">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TestPro — Natijalar Tarixi</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Unbounded:wght@700;800;900&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/>
<link href="css/bottomnav.css" rel="stylesheet"/>
<style>
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.pg-t{font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:900;display:flex;align-items:center;gap:.4rem}

.dgrp{margin-bottom:.8rem}
.dhdr{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1rem;border-radius:16px;
  cursor:pointer;background:var(--card);border:1px solid var(--border);transition:all .22s;user-select:none}
.dhdr.open{border-color:var(--p1);background:var(--border-soft);border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom-color:transparent}
.dh-l{display:flex;align-items:center;gap:.6rem}
.dh-ico{width:38px;height:38px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(120deg,var(--p1),var(--p2));display:flex;align-items:center;justify-content:center;font-size:.95rem}
.dh-date{font-size:.89rem;font-weight:800}
.dh-info{font-size:.7rem;color:var(--text3);font-weight:600;margin-top:.08rem}
.dh-r{display:flex;align-items:center;gap:.4rem}
.dh-cnt{font-size:.7rem;font-weight:800;color:var(--p1);background:var(--border-soft);border-radius:99px;padding:.18rem .55rem;border:1px solid var(--border)}
.dh-arr{font-size:.7rem;color:var(--text3);transition:transform .25s}
.dhdr.open .dh-arr{transform:rotate(180deg)}
.ditems{display:none;flex-direction:column;gap:.4rem;padding:.55rem;background:var(--card);
  border:1px solid var(--p1);border-top:none;border-bottom-left-radius:16px;border-bottom-right-radius:16px}
.ditems.open{display:flex;animation:accOpen .3s ease both}
@keyframes accOpen{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.rc{display:flex;align-items:center;justify-content:space-between;gap:.5rem;padding:.75rem .85rem;border-radius:13px;
  background:var(--bg-deep);border:1px solid var(--border-soft);transition:all .2s;cursor:pointer}
.rc:hover{border-color:var(--p1);transform:translateX(3px)}
.rc-l{flex:1;min-width:0}
.rc-nm{font-size:.85rem;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:.15rem}
.rc-meta{font-size:.68rem;color:var(--text3);display:flex;gap:.45rem;flex-wrap:wrap;font-weight:600}
.rc-r{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem;flex-shrink:0}
.rc-pct{font-family:'Unbounded',sans-serif;font-size:1rem;font-weight:900}
.sg{color:var(--good)}.sa{color:var(--warn)}.sr{color:var(--bad)}
.rc-frac{font-size:.65rem;color:var(--text3);font-weight:600}
.tbtn{padding:.3rem .65rem;border-radius:8px;font-size:.68rem;font-weight:700;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--p1);font-family:inherit;white-space:nowrap;transition:all .2s}
.tbtn:hover{background:var(--p1);color:#fff;border-color:var(--p1)}

.emp{text-align:center;padding:2.6rem 1rem}
.emp-e{font-size:2.6rem;margin-bottom:.7rem}
.emp-t{font-size:.92rem;font-weight:800;margin-bottom:.25rem}
.emp-s{font-size:.78rem;color:var(--text3)}
</style>
</head>
<body>

<div class="grain"></div>
<div class="mesh-extra"></div>

<nav class="nav">
  <div class="logo" onclick="goTo('home.html')">
    <div class="logo-mk"><span>🎓</span></div>
    <span class="logo-tx">TestPro</span>
  </div>
  <div class="nav-r">
    <button class="btn btn-secondary btn-sm" onclick="goTo('dashboard.html')">← Orqaga</button>
    <button class="ibtn" id="tbtn">🌙</button>
  </div>
</nav>

<div class="page">
<div class="w">

  <div class="top-bar">
    <div class="pg-t">📜 Natijalar tarixi</div>
    <button class="btn btn-danger btn-sm" onclick="clearAll()">🗑 Tozalash</button>
  </div>

  <div class="stats">
    <div class="sb"><div class="sv" id="st-all">0</div><div class="sl">Jami</div></div>
    <div class="sb"><div class="sv" id="st-avg">—</div><div class="sl">O'rtacha</div></div>
    <div class="sb"><div class="sv" id="st-best">—</div><div class="sl">Eng yaxshi</div></div>
  </div>

  <div class="filters" id="filters">
    <button class="fchip on" onclick="setFilter('all',this)">🗂 Barchasi</button>
  </div>

  <div id="content"><div class="sp-wrap"><div class="sp"><i></i><i></i></div></div></div>

</div>
</div>

<script src="js/api.js"></script>
<script src="js/bottomnav.js"></script>
<script src="js/common.js"></script>
<script>
if(typeof normalizeQ==='undefined'){window.normalizeQ=function(arr){return(arr||[]).map(function(q){
  const type=q.type==='multiple_choice'?'multiple':q.type==='true_false'?'truefalse':q.type||'multiple';
  const text=q.text||q.question||q.q||'';
  const options=(q.options||[]).map(function(o){return String(o);});
  let correct=0;
  if(typeof q.correct==='number'){correct=q.correct;}
  else if(typeof q.correct==='string'){const idx=options.findIndex(function(o){return o===q.correct||o.trim()===q.correct.trim();});correct=idx>=0?idx:0;}
  return Object.assign({}, q, {type:type,text:text,options:options,correct:correct,explanation:q.explanation||'',points:q.points||1});
});};}
if(typeof fmtTime==='undefined'){window.fmtTime=function(s){s=s||0;return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');};}
if(typeof fmtDate==='undefined'){window.fmtDate=function(ts){if(!ts)return'—';try{const ms=(typeof ts==='number'&&ts<1e12)?ts*1000:ts;return new Date(ms).toLocaleDateString('uz-UZ',{day:'numeric',month:'short',year:'numeric'});}catch(e){return'—';}};}

let ALL=[], CUR='all';

function setFilter(f, el){
  CUR=f;
  document.querySelectorAll('.fchip').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  render(ALL);
}

function dayKey(ts){ try{ const d=new Date(ts); return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate()+''; }catch(e){ return '0'; } }
function dayLabel(ts){
  try{
    const d=new Date(ts); const t=new Date(); const y=new Date(t); y.setDate(y.getDate()-1);
    if(d.toDateString()===t.toDateString()) return 'Bugun';
    if(d.toDateString()===y.toDateString()) return 'Kecha';
    return d.toLocaleDateString('uz-UZ',{day:'numeric',month:'long',year:'numeric'});
  }catch(e){ return '—'; }
}
function timeStr(ts){ try{ return new Date(ts).toLocaleTimeString('uz-UZ',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } }
function elapsed2str(s){ s=s||0; return Math.floor(s/60)+'d '+String(s%60).padStart(2,'0')+'s'; }

function render(list){
  const wrap=document.getElementById('content');
  const filtered = CUR==='all' ? list : list.filter(function(r){return (r.subject||r.category||'other')===CUR;});
  if(!filtered.length){
    wrap.innerHTML='<div class="emp"><div class="emp-e">📭</div><div class="emp-t">Natija topilmadi</div><div class="emp-s">Bu fan bo\'yicha hali test ishlanmagan</div></div>';
    return;
  }
  const groups={};
  filtered.forEach(function(r){
    const k=dayKey(r.completedAt);
    if(!groups[k]) groups[k]={label:dayLabel(r.completedAt), items:[]};
    groups[k].items.push(r);
  });
  const keys=Object.keys(groups).sort(function(a,b){return b-a;});
  wrap.innerHTML='';
  keys.forEach(function(k, gi){
    const g=groups[k]; const isFirst = gi===0;
    const avg=Math.round(g.items.reduce(function(s,r){return s+(r.percentage||r.score||0);},0)/g.items.length);
    const gEl=document.createElement('div'); gEl.className='dgrp';
    const hdr=document.createElement('div'); hdr.className='dhdr'+(isFirst?' open':'');
    hdr.innerHTML=
      '<div class="dh-l"><div class="dh-ico">📅</div><div>'+
        '<div class="dh-date">'+g.label+'</div>'+
        '<div class="dh-info">O\'rtacha: '+avg+'% · '+g.items.length+' ta</div>'+
      '</div></div>'+
      '<div class="dh-r"><span class="dh-cnt">'+g.items.length+'</span><span class="dh-arr">▼</span></div>';
    const items=document.createElement('div'); items.className='ditems'+(isFirst?' open':'');
    g.items.forEach(function(r){
      const subKey = r.subject||r.category||'other';
      const sub=getSubject(subKey); const ico=(typeof getIco==='function'?getIco(subKey):null)||ICON[subKey]||'📚';
      const pct=Math.round(r.percentage||r.score||0);
      const cls = pct>=80?'sg':pct>=50?'sa':'sr';
      const c=document.createElement('div'); c.className='rc';
      c.onclick=function(){goTo('review.html?id='+r.id);};
      c.innerHTML=
        '<div class="rc-l">'+
          '<div class="rc-nm">'+esc(r.testTitle||r.testId||'Test')+'</div>'+
          '<div class="rc-meta">'+
            '<span>'+ico+' '+esc(sub.label)+'</span>'+
            '<span>🕐 '+timeStr(r.completedAt)+'</span>'+
            '<span>📝 '+(r.total||0)+' savol</span>'+
            (r.elapsed?('<span>⏱ '+elapsed2str(r.elapsed)+'</span>'):'')+
          '</div>'+
        '</div>'+
        '<div class="rc-r">'+
          '<div class="rc-pct '+cls+'">'+pct+'%</div>'+
          '<div class="rc-frac">'+(r.correct||0)+' / '+(r.total||0)+'</div>'+
          '<button class="tbtn">🔍 Tahlil</button>'+
        '</div>';
      c.querySelector('.tbtn').onclick=function(e){e.stopPropagation();goTo('review.html?id='+r.id);};
      items.appendChild(c);
    });
    hdr.onclick=function(){
      const o=hdr.classList.contains('open');
      hdr.classList.toggle('open',!o);
      items.classList.toggle('open',!o);
    };
    gEl.appendChild(hdr); gEl.appendChild(items); wrap.appendChild(gEl);
  });
}

async function clearAll(){
  if(!confirm('Barcha natijalar tarixini tozalashni xohlaysizmi?')) return;
  localStorage.removeItem('tp_results');
  ALL=[]; render([]);
  document.getElementById('st-all').textContent='0';
  document.getElementById('st-avg').textContent='—';
  document.getElementById('st-best').textContent='—';
  toast('🗑 Tarix tozalandi');
}

(async()=>{
  let CU=null; try{ CU=await AuthHelpers.getCurrentUser(); }catch(e){}
  const uid = CU ? String(CU.id||CU.uid||CU._tg_id||'') : '';
  try{
    const res = await DB.getMyResults(uid, 0);
    ALL=res;
    document.getElementById('st-all').textContent = res.length;
    if(res.length){
      const avg = Math.round(res.reduce(function(s,r){return s+(r.percentage||r.score||0);},0)/res.length);
      const best = Math.max.apply(null, res.map(function(r){return r.percentage||r.score||0;}));
      document.getElementById('st-avg').textContent = Math.round(avg)+'%';
      document.getElementById('st-best').textContent = Math.round(best)+'%';
    }
    const subjects = Array.from(new Set(res.map(function(r){return r.subject||r.category||'other';})));
    const fr = document.getElementById('filters');
    subjects.forEach(function(s){
      const sub=getSubject(s); const ico=(typeof getIco==='function'?getIco(s):null)||ICON[s]||'📚';
      const btn=document.createElement('button'); btn.className='fchip';
      btn.innerHTML = ico+' '+esc(sub.label);
      btn.onclick=function(){setFilter(s, btn);};
      fr.appendChild(btn);
    });
    render(res);
  }catch(e){
    document.getElementById('content').innerHTML =
      '<div class="emp"><div class="emp-e">❌</div><div class="emp-t">Xatolik</div><div class="emp-s">'+esc(e.message)+'</div></div>';
  }
})();
</script></body>
</html>
