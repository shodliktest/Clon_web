<!DOCTYPE html>
<html lang="uz" data-theme="light" style="background:#F5F3FF">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TestPro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Unbounded:wght@700;800;900&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/>
<link href="css/bottomnav.css" rel="stylesheet"/>
<style>
  .quote-card{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:180px}
  .quote-mark{font-family:'Unbounded',sans-serif;font-size:2.6rem;line-height:1;color:rgba(255,255,255,.4);margin-bottom:-.5rem}
  .quote-text{font-size:1.05rem;font-weight:700;color:#fff;line-height:1.6;max-width:30rem;
    min-height:4.8em;display:flex;align-items:center;justify-content:center;
    transition:opacity .4s ease,transform .4s ease}
  .quote-author{margin-top:.7rem;font-size:.8rem;font-weight:700;color:rgba(255,255,255,.85);
    transition:opacity .4s ease,transform .4s ease}
  .quote-fade{opacity:0;transform:translateY(6px)}
</style>
</head>
<body>

<div class="grain"></div>
<div class="mesh-extra"></div>

<nav class="nav">
  <div class="logo" onclick="goTo('home.html')">
    <div class="logo-mk"><span>🎓</span></div>
    <span class="logo-tx">TestPro</span>
  </div>
  <div class="nav-r">
    <button class="ibtn" id="tbtn">🌙</button>
  </div>
</nav>

<div class="page">

  <div class="hero">
    <div class="hero-badge"><i></i> Interaktiv testlar platformasi</div>
    <div class="hero-h">Bilimingizni<br/><span class="grad">yangicha his qiling</span></div>
    <p class="hero-p">O'nlab fandan tayyor testlar — bilimingizni bir joyda sinang.</p>
    <div class="hero-actions">
      <button class="hero-btn" onclick="document.getElementById('content').scrollIntoView({behavior:'smooth'})">Testlarni ko'rish →</button>
      <button class="hero-btn2" onclick="window.open('https://t.me/Quiztimeuzbot?start=webapp','_blank')">O'z testimni yarataman</button>
    </div>
  </div>

  <div class="statstrip">
    <div class="stat-item"><div class="stat-v" id="stat-subj">0</div><div class="stat-l">Fan</div></div>
    <div class="stat-item"><div class="stat-v" id="stat-tests">0</div><div class="stat-l">Test</div></div>
    <div class="stat-item"><div class="stat-v" id="stat-solved">0</div><div class="stat-l">Yechilgan</div></div>
  </div>

  <div class="filters" id="filters"></div>

  <div id="content"><div class="sp-wrap"><div class="sp"><i></i><i></i></div></div></div>

  <div class="cta quote-card" id="cta" style="display:none">
    <div class="quote-mark">"</div>
    <p class="quote-text" id="quoteText">Yuklanmoqda...</p>
    <div class="quote-author" id="quoteAuthor"></div>
  </div>

</div>

<!-- KO'RISH (PREVIEW) MODAL -->
<div class="book-modal-bg" id="book-modal-bg">
  <div class="book-modal">
    <div class="book-cover">
      <button class="book-close" onclick="closeBookModal()">✕</button>
      <div class="book-badge" id="book-badge">Umumiy</div>
      <div class="book-cover-title" id="book-cover-title">...</div>
    </div>
    <div class="book-body">
      <div class="book-title" id="book-title">...</div>
      <div class="book-author" id="book-author">...</div>
      <p class="book-desc" id="book-desc-text"></p>
      <div class="book-meta">
        <div class="b-meta"><div class="b-ico">📝</div><div class="b-val" id="book-qcount">—</div><div class="b-lbl">Savol</div></div>
        <div class="b-meta"><div class="b-ico">⏱</div><div class="b-val" id="book-time">—</div><div class="b-lbl">Vaqt</div></div>
        <div class="b-meta"><div class="b-ico">👁</div><div class="b-val" id="book-solves">—</div><div class="b-lbl">Yechilgan</div></div>
      </div>
      <button class="book-start-btn" id="book-start-btn">Sinovni boshlash →</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/bottomnav.js"></script>
<script src="js/common.js"></script>
<script>
/* Carousel, TH, esc, toast, ICON, animateCount, spotlight-hover —
   barchasi js/common.js faylida aniqlangan (yuqorida ulangan). */

/* ── Karta qurish ── */
function buildCard(t, icon, idx){
  const c=document.createElement('div');
  c.className='card';
  c.style.animationDelay=(Math.min(idx,8)*0.05)+'s';
  c.onclick=()=>goTo('test.html?id='+(t.test_id||t.id));
  c.innerHTML=`
    <div class="card-icon">${icon}</div>
    <div class="card-title">${esc(t.title)}</div>
    <div class="card-author">${esc(t.creator_name||t.authorName||'Anonim')}</div>
    <div class="chips">
      <span class="ch">📝 ${t.question_count||0}</span>
      <span class="ch">👁 ${t.solve_count||0}</span>
      ${t.time_limit?`<span class="ch">⏱ ${t.time_limit}daq</span>`:''}
      ${t.avg_score?`<span class="ch gold">⭐${Math.round(t.avg_score)}%</span>`:''}
    </div>
    <div class="card-actions">
      <button class="card-view" title="Ko'rish">👁</button>
      <button class="card-btn">Boshlash →</button>
    </div>`;
  c.querySelector('.card-view').onclick=(e)=>{e.stopPropagation();openBookPreview(t.test_id||t.id,t);};
  return c;
}

/* ── Ro'yxat elementi qurish ── */
function buildListItem(t, icon, idx){
  const el=document.createElement('div');
  el.className='li';
  el.style.animationDelay=(Math.min(idx,10)*0.04)+'s';
  el.onclick=()=>openBookPreview(t.test_id||t.id,t);
  el.innerHTML=`
    <div class="li-ico">${icon}</div>
    <div class="li-info">
      <div class="li-nm">${esc(t.title)}</div>
      <div class="li-meta">
        <span>📝 ${t.question_count||0}</span>
        <span>👁 ${t.solve_count||0}</span>
        ${t.avg_score?`<span>⭐${Math.round(t.avg_score)}%</span>`:''}
        <span>${esc(t.creator_name||'Anonim')}</span>
      </div>
    </div>
    <button class="li-btn">▶</button>`;
  el.querySelector('.li-btn').onclick=(e)=>{e.stopPropagation();goTo('test.html?id='+(t.test_id||t.id));};
  return el;
}

/* ── Guruh listini ko'rsatish (barchasi bosilganda) ── */
function showGroupList(subj, arr, icon, sub){
  const wrap=document.getElementById('content');
  document.getElementById('cta').style.display='none';
  wrap.innerHTML='';

  const back=document.createElement('button');
  back.className='back-btn';
  back.innerHTML='← Orqaga';
  back.onclick=()=>renderGroups(window._allPub);
  wrap.appendChild(back);

  const hdr=document.createElement('div');
  hdr.className='grp-hdr';
  hdr.innerHTML=`
    <div class="grp-l">
      <div class="grp-icon">${icon}</div>
      <div>
        <div class="grp-nm">${esc(sub.label)}</div>
        <div class="grp-ct">${arr.length} ta test</div>
      </div>
    </div>`;
  wrap.appendChild(hdr);

  const list=document.createElement('div');
  list.className='list-view';
  arr.forEach((t,i)=>list.appendChild(buildListItem(t,icon,i)));
  wrap.appendChild(list);
}

/* ── Asosiy guruhlar ko'rinishi ── */
function renderGroups(pub){
  const wrap=document.getElementById('content');
  wrap.innerHTML='';
  document.getElementById('cta').style.display='block';

  const grps={};
  pub.forEach(t=>{const k=t.category||t.subject||'other';if(!grps[k])grps[k]=[];grps[k].push(t);});

  Object.entries(grps).forEach(([subj,arr])=>{
    const sub=getSubject(subj);
    const icon=ICON[subj]||getIco(subj)||'📚';

    const g=document.createElement('div');
    g.className='grp';

    const hdr=document.createElement('div');
    hdr.className='grp-hdr';
    hdr.innerHTML=`
      <div class="grp-l">
        <div class="grp-icon">${icon}</div>
        <div>
          <div class="grp-nm">${esc(sub.label)}</div>
          <div class="grp-ct">${arr.length} ta test</div>
        </div>
      </div>
      <button class="see-all">Barchasi →</button>`;
    hdr.querySelector('.see-all').onclick=()=>showGroupList(subj,arr,icon,sub);
    g.appendChild(hdr);

    const scroll=document.createElement('div');
    scroll.className='scroll carousel';
    arr.forEach((t,i)=>scroll.appendChild(buildCard(t,icon,i)));
    g.appendChild(scroll);

    wrap.appendChild(g);
    Carousel.register(scroll);
  });

  document.getElementById('stat-subj').textContent = Object.keys(grps).length;
}

/* ── Filter chiplarini render qilish ── */
function renderFilters(pub){
  const wrap=document.getElementById('filters');
  const grps={};
  pub.forEach(t=>{const k=t.category||t.subject||'other';if(!grps[k])grps[k]=[];grps[k].push(t);});
  const cats=[{k:null,label:'Barchasi',icon:'✨'}].concat(
    Object.keys(grps).map(k=>({k,label:getSubject(k).label,icon:ICON[k]||getIco(k)||'📚'}))
  );
  wrap.innerHTML='';
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='fchip'+(c.k===null?' on':'');
    b.innerHTML=`${c.icon} ${esc(c.label)}`;
    b.onclick=()=>{
      wrap.querySelectorAll('.fchip').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      renderGroups(c.k===null ? pub : pub.filter(t=>(t.category||t.subject||'other')===c.k));
    };
    wrap.appendChild(b);
  });
}

/* ── Load ── */
(async()=>{
  const wrap=document.getElementById('content');
  try{
    const tests=await DB.getPublicTests();
    const pub=(tests||[]).filter(t=>t.visibility==='public');
    window._allPub=pub;

    if(!pub.length){
      wrap.innerHTML=`<div class="hero">
        <div class="hero-h">TestPro ga<br/><span class="grad">xush kelibsiz!</span></div>
        <p class="hero-p">Hozircha ommaviy test mavjud emas. Birinchi bo'ling!</p>
        <button class="hero-btn" onclick="window.open('https://t.me/Quiztimeuzbot?start=webapp','_blank')">Test yaratish →</button>
      </div>`;
      return;
    }

    renderFilters(pub);
    renderGroups(pub);

    const totalSolved = pub.reduce((s,t)=>s+(t.solve_count||0),0);
    animateCount(document.getElementById('stat-tests'), pub.length);
    animateCount(document.getElementById('stat-solved'), totalSolved);
  }catch(e){
    wrap.innerHTML=`<div class="err">❌ Xatolik: ${e.message}</div>`;
  }
})();

/* ── Olim va faylasuflarning mashhur gaplari — CTA karta o'rniga ── */
const QUOTES=[
  {t:"Bilim — kuch.",a:"Frensis Bekon"},
  {t:"Tasavvur bilimdan muhimroqdir.",a:"Albert Eynshteyn"},
  {t:"Men bilganim shuki, hech narsa bilmayman.",a:"Sokrat"},
  {t:"Hayotda qo'rqiladigan narsa yo'q, faqat tushuniladigan narsa bor.",a:"Mari Kyuri"},
  {t:"Ta'lim — dunyoni o'zgartirish uchun eng kuchli qurol.",a:"Nelson Mandela"},
  {t:"Bilim — chiroq, johillik — zulmat.",a:"Abu Ali ibn Sino"},
  {t:"O'qishni yaxshi ko'rgan kishi hech qachon zerikmaydi.",a:"Konfutsiy"},
  {t:"Kim menga bir harf o'rgatsa, men umrbod unga qulman.",a:"Alisher Navoiy"},
  {t:"Bilim izlash — beshikdan qabrgacha davom etadigan yo'l.",a:"Hikmatli gap"},
  {t:"Men mag'lubiyatga uchramadim — shunchaki ishlamaydigan 10 000 usulni topdim.",a:"Tomas Edison"},
];
let qIdx=Math.floor(Math.random()*QUOTES.length), qTimer=null;
function showQuote(i){
  const te=document.getElementById('quoteText'), ae=document.getElementById('quoteAuthor');
  if(!te||!ae) return;
  te.classList.add('quote-fade'); ae.classList.add('quote-fade');
  setTimeout(()=>{
    te.textContent='"'+QUOTES[i].t+'"';
    ae.textContent='— '+QUOTES[i].a;
    te.classList.remove('quote-fade'); ae.classList.remove('quote-fade');
  },400);
}
showQuote(qIdx);
qTimer=setInterval(()=>{ qIdx=(qIdx+1)%QUOTES.length; showQuote(qIdx); },6000);
</script></body>
</html>
