<!DOCTYPE html>
<html lang="uz" data-theme="light" style="background:#F5F3FF">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TestPro — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Unbounded:wght@700;800;900&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/>
<link href="css/bottomnav.css" rel="stylesheet"/>
<style>
/* ── Faqat shu sahifaga xos: admin item, tab, auth-card ── */
.page-h{font-family:'Unbounded',sans-serif;font-size:1.25rem;font-weight:900;color:var(--warn);
  margin-bottom:1.3rem;display:flex;align-items:center;gap:.5rem}

.tabs{display:flex;gap:.5rem;margin-bottom:1.3rem;flex-wrap:wrap}
.tab{padding:.55rem 1.1rem;border-radius:12px;border:1px solid var(--border);
  background:var(--card);cursor:pointer;font-size:.81rem;font-weight:700;
  font-family:inherit;color:var(--text2);transition:all .22s}
.tab.on{border-color:var(--p1);background:var(--border-soft);color:var(--p1)}

.item{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:.9rem 1rem;margin-bottom:.55rem;box-shadow:var(--shadow-sm);
  display:flex;align-items:center;justify-content:space-between;gap:.7rem;flex-wrap:wrap;
  transition:all .22s}
.item:hover{border-color:var(--border);box-shadow:var(--shadow)}
.item-l{display:flex;align-items:center;gap:.75rem;flex:1;min-width:0}
.ava-a{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;
  justify-content:center;font-size:1.02rem;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}
.ava-a img{width:100%;height:100%;object-fit:cover}
.item-name{font-size:.89rem;font-weight:800;color:var(--text);margin-bottom:.18rem;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-meta{font-size:.72rem;color:var(--text3)}
.itag{display:inline-block;padding:.16rem .5rem;border-radius:99px;
  font-size:.64rem;font-weight:800;margin-left:.32rem}
.t-pub{background:var(--good-bg);color:var(--good)}
.t-priv{background:var(--warn-bg);color:var(--warn)}
.t-pause{background:var(--bad-bg);color:var(--bad)}
.act-wrap{display:flex;gap:.4rem;flex-shrink:0}
.abtn{padding:.4rem .78rem;border-radius:10px;border:1px solid;cursor:pointer;
  font-size:.75rem;font-weight:700;font-family:inherit;transition:all .22s}
.abtn-p{background:var(--border-soft);color:var(--p1);border-color:var(--border)}
.abtn-p:hover{background:var(--p1);color:#fff}
.abtn-d{background:var(--bad-bg);color:var(--bad);border-color:rgba(220,38,38,.2)}
.abtn-d:hover{background:var(--bad);color:#fff}
.abtn-a{background:var(--warn-bg);color:var(--warn);border-color:rgba(217,119,6,.2)}
.abtn-a:hover{background:var(--warn);color:#fff}
.abtn-g{background:var(--good-bg);color:var(--good);border-color:rgba(5,150,105,.2)}
.abtn-g:hover{background:var(--good);color:#fff}

/* AUTH SCREEN */
.auth-card{background:var(--card);border-radius:24px;padding:2.2rem 1.8rem;max-width:340px;
  margin:6rem auto 0;border:1px solid var(--border);box-shadow:var(--shadow-lg);text-align:center;
  position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:-60%;left:50%;transform:translateX(-50%);
  width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(217,119,6,.16),transparent 70%);pointer-events:none}
.auth-card h2{font-family:'Unbounded',sans-serif;font-size:1.05rem;font-weight:900;
  color:var(--warn);margin-bottom:1.1rem;position:relative}
.auth-hint{font-size:.73rem;color:var(--text3);margin-top:.7rem;position:relative}
.auth-btn-warn{background:linear-gradient(120deg,var(--warn),#f59e0b)!important}
</style>
</head>
<body>

<div class="grain"></div>
<div class="mesh-extra"></div>

<nav class="nav">
  <div class="logo" onclick="goTo('home.html')">
    <div class="logo-mk"><span>🎓</span></div>
    <span class="logo-tx">TestPro</span>
  </div>
  <div class="nav-r">
    <button class="btn btn-secondary btn-sm" onclick="goTo('dashboard.html')">← Dashboard</button>
    <button class="ibtn" id="tbtn">🌙</button>
  </div>
</nav>

<!-- AUTH SCREEN -->
<div id="auth-screen" style="display:none" class="page-narrow">
<div class="w">
  <div class="auth-card">
    <div style="font-size:2.3rem;margin-bottom:.6rem;position:relative">👑</div>
    <h2>Admin kirish</h2>
    <div class="field">
      <input class="input" id="auth-id" type="number" placeholder="Telegram ID" inputmode="numeric" style="text-align:center;margin-bottom:.7rem"/>
      <input class="input" id="auth-pass" type="password" placeholder="Parol" style="text-align:center"/>
    </div>
    <button class="btn btn-primary auth-btn-warn btn-block" onclick="doLogin()">Kirish</button>
    <div class="auth-hint">ID ni bilmasangiz botga /id yuboring</div>
  </div>
</div>
</div>

<!-- MAIN PANEL -->
<div id="main-screen" style="display:none" class="page">
<div class="w">

  <div class="page-h">👑 Admin Panel</div>

  <div class="stats" id="stats-wrap" style="grid-template-columns:repeat(2,1fr)">
    <div class="sb"><div class="sv" id="cnt-tests">…</div><div class="sl">Testlar</div></div>
    <div class="sb"><div class="sv" id="cnt-solve">…</div><div class="sl">Jami yechilgan</div></div>
  </div>

  <div class="tabs">
    <button class="tab on" id="tab-tests" onclick="switchTab('tests')">📝 Testlar</button>
    <button class="tab" id="tab-stats" onclick="switchTab('stats')">📊 Statistika</button>
  </div>

  <div id="panel-tests">
    <input class="input mb-2" id="srch-tests" placeholder="🔍 Test qidirish..." oninput="filterTests()"/>
    <div id="tests-list"><div class="sp-wrap"><div class="sp"><i></i><i></i></div></div></div>
  </div>

  <div id="panel-stats" style="display:none">
    <div id="stats-detail"></div>
  </div>

</div>
</div>

<script src="js/api.js"></script>
<script src="js/bottomnav.js"></script>
<script src="js/common.js"></script>
<script>
/* ── AVATAR (admin uchun rangli, xat asosli) ── */
function avatarEl(name, photoUrl){
  const colors = ['#7c3aed','#ec4899','#059669','#d97706','#2563eb','#dc2626'];
  const col = colors[(name||'?').charCodeAt(0) % colors.length];
  const letter = (name||'?')[0].toUpperCase();
  if(photoUrl){
    return '<div class="ava-a"><img src="'+photoUrl+'" onerror="this.parentElement.textContent=\''+letter+'\';this.parentElement.style.background=\''+col+'\'"/></div>';
  }
  return '<div class="ava-a" style="background:'+col+'">'+letter+'</div>';
}

/* ── SESSION (admin — Telegram autentifikatsiyasidan mustaqil,
   alohida ID+parol orqali) ── */
const SESSION_KEY = 'tp_admin_session';
function getSession(){ try{ return JSON.parse(localStorage.getItem(SESSION_KEY)||'null'); }catch(e){ return null; } }
function setSession(s){ localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
function clearSession(){ localStorage.removeItem(SESSION_KEY); }

/* ── AUTH ── */
async function doLogin(){
  const uid = document.getElementById('auth-id').value.trim();
  const pass = document.getElementById('auth-pass').value.trim();
  if(!uid || !pass){ toast('❌ ID va parolni kiriting'); return; }

  try{
    const res = await fetch('/api/proxy?endpoint=admin/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({uid: uid, password: pass})
    });
    const data = await res.json();
    if(data.ok){
      const userRes = await fetch('/api/proxy?endpoint=user/'+uid);
      const user = await userRes.json();
      setSession({uid: uid, name: user.name||'Admin', is_admin:true});
      showMain();
    } else {
      toast('❌ '+(data.error||'Xato'));
    }
  }catch(e){ toast('❌ Ulanish xatosi'); }
}

document.addEventListener('keydown', function(e){
  if(e.key==='Enter' && document.getElementById('auth-screen').style.display!=='none') doLogin();
});

/* ── INIT ── */
(async()=>{
  const s = getSession();
  if(s && s.is_admin){
    showMain();
  } else {
    document.getElementById('auth-screen').style.display='block';
  }
})();

async function showMain(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  await loadTests();
}

/* ── TABS ── */
function switchTab(t){
  document.getElementById('panel-tests').style.display = t==='tests' ? 'block' : 'none';
  document.getElementById('panel-stats').style.display = t==='stats' ? 'block' : 'none';
  document.getElementById('tab-tests').classList.toggle('on', t==='tests');
  document.getElementById('tab-stats').classList.toggle('on', t==='stats');
  if(t==='stats') renderStats();
}

/* ── TESTS ── */
let allTests=[], filteredTests=[];

async function loadTests(){
  try{
    const res = await fetch('/api/proxy?endpoint=admin/tests');
    const data = await res.json();
    if(Array.isArray(data)){
      allTests = data;
    } else {
      const pub = await fetch('/api/proxy?endpoint=tests/public');
      allTests = await pub.json();
    }
    filteredTests = allTests.slice();
    document.getElementById('cnt-tests').textContent = allTests.length;
    const totalSolve = allTests.reduce(function(s,t){return s+(t.solve_count||0);},0);
    document.getElementById('cnt-solve').textContent = totalSolve;
    renderTests();
  }catch(e){
    document.getElementById('tests-list').innerHTML = '<div class="emp">❌ Yuklanmadi</div>';
  }
}

function filterTests(){
  const q = document.getElementById('srch-tests').value.toLowerCase();
  filteredTests = q ? allTests.filter(function(t){return (t.title||'').toLowerCase().includes(q);}) : allTests.slice();
  renderTests();
}

function renderTests(){
  const wrap = document.getElementById('tests-list');
  if(!filteredTests.length){ wrap.innerHTML = '<div class="emp">Test topilmadi</div>'; return; }
  wrap.innerHTML = filteredTests.map(function(t){
    const qc = t.question_count || t.questionCount || 0;
    const sc = t.solve_count || t.attempts || 0;
    const avg = t.avg_score || t.averageScore || 0;
    const author = t.creator_name || t.authorName || 'Anonim';
    const visTag = t.visibility==='public'
      ? '<span class="itag t-pub">🌐 Ommaviy</span>'
      : '<span class="itag t-priv">🔒 Maxsus</span>';
    const pauseTag = t.is_paused ? '<span class="itag t-pause">⏸ Pause</span>' : '';
    const date = t.created_at ? new Date(t.created_at).toLocaleDateString('uz-UZ',{day:'numeric',month:'short',year:'numeric'}) : '';
    return '<div class="item">'+
      '<div class="item-l">'+
        avatarEl(t.title)+
        '<div style="flex:1;min-width:0">'+
          '<div class="item-name">'+esc(t.title||'?')+visTag+pauseTag+'</div>'+
          '<div class="item-meta">👤 '+esc(author)+' &nbsp;·&nbsp; 📝 '+qc+' savol &nbsp;·&nbsp; ▶ '+sc+' marta'+
            (avg?(' &nbsp;·&nbsp; ⭐ '+Math.round(avg)+'%'):'')+
            (date?(' &nbsp;·&nbsp; 📅 '+date):'')+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="act-wrap">'+
        '<button class="abtn abtn-p" data-act="open">▶️ Ochish</button>'+
        (t.is_paused
          ? '<button class="abtn abtn-g" data-act="resume">▶ Davom</button>'
          : '<button class="abtn abtn-a" data-act="pause">⏸ Pause</button>')+
        '<button class="abtn abtn-d" data-act="del">🗑️</button>'+
      '</div>'+
    '</div>';
  }).join('');
  Array.from(wrap.children).forEach(function(card, i){
    const t = filteredTests[i];
    const tid = t.id || t.test_id;
    const openBtn = card.querySelector('[data-act="open"]');
    if(openBtn) openBtn.onclick = function(){ goTo('test.html?id='+tid); };
    const pauseBtn = card.querySelector('[data-act="pause"]');
    if(pauseBtn) pauseBtn.onclick = function(){ adminPause(tid, true); };
    const resumeBtn = card.querySelector('[data-act="resume"]');
    if(resumeBtn) resumeBtn.onclick = function(){ adminPause(tid, false); };
    const delBtn = card.querySelector('[data-act="del"]');
    if(delBtn) delBtn.onclick = function(){ adminDel(tid); };
  });
}

/* ── STATS ── */
function renderStats(){
  const wrap = document.getElementById('stats-detail');
  if(!allTests.length){ wrap.innerHTML = '<div class="emp">Ma\'lumot yo\'q</div>'; return; }

  const totalSolve = allTests.reduce(function(s,t){return s+(t.solve_count||0);},0);
  const withScore = allTests.filter(function(t){return t.avg_score;});
  const avgAll = withScore.length ? withScore.reduce(function(s,t){return s+t.avg_score;},0)/withScore.length : 0;
  const pubCount = allTests.filter(function(t){return t.visibility==='public';}).length;
  const topTest = allTests.slice().sort(function(a,b){return (b.solve_count||0)-(a.solve_count||0);})[0];

  let html =
    '<div class="stats" style="grid-template-columns:repeat(2,1fr)">'+
      '<div class="sb"><div class="sv">'+allTests.length+'</div><div class="sl">Jami testlar</div></div>'+
      '<div class="sb"><div class="sv">'+pubCount+'</div><div class="sl">Ommaviy</div></div>'+
      '<div class="sb"><div class="sv">'+totalSolve+'</div><div class="sl">Jami yechilgan</div></div>'+
      '<div class="sb"><div class="sv">'+(avgAll?Math.round(avgAll)+'%':'—')+'</div><div class="sl">O\'rtacha ball</div></div>'+
    '</div>';

  if(topTest){
    html +=
      '<div style="margin-top:1rem">'+
        '<div style="font-size:.76rem;color:var(--text3);font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem">🏆 Eng mashhur test</div>'+
        '<div class="item" id="top-test-item">'+
          '<div class="item-l">'+
            avatarEl(topTest.title)+
            '<div>'+
              '<div class="item-name">'+esc(topTest.title)+'</div>'+
              '<div class="item-meta">▶ '+(topTest.solve_count||0)+' marta · ⭐ '+Math.round(topTest.avg_score||0)+'%</div>'+
            '</div>'+
          '</div>'+
          '<button class="abtn abtn-p" id="top-test-btn">▶️</button>'+
        '</div>'+
      '</div>';
  }

  html += '<div style="margin-top:1.2rem;text-align:center"><button class="btn btn-danger btn-sm" onclick="doLogout()">🚪 Chiqish</button></div>';

  wrap.innerHTML = html;
  if(topTest){
    const tid = topTest.id || topTest.test_id;
    document.getElementById('top-test-btn').onclick = function(){ goTo('test.html?id='+tid); };
  }
}

/* ── ACTIONS ── */
window.adminPause = async function(id, pause){
  try{
    const res = await fetch('/api/proxy?endpoint=admin/test/'+id+'/pause', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({pause: pause})
    });
    const d = await res.json();
    if(d.ok){
      const t = allTests.find(function(x){return (x.id||x.test_id)===id;});
      if(t) t.is_paused = pause;
      filteredTests = allTests.slice();
      renderTests();
      toast(pause ? '⏸ Pause qilindi' : '▶ Davom ettirildi');
    } else { toast('❌ '+(d.error||'Xato')); }
  }catch(e){ toast('❌ Ulanish xatosi'); }
};

window.adminDel = async function(id){
  if(!confirm("Testni o'chirishni xohlaysizmi?")) return;
  try{
    const res = await fetch('/api/proxy?endpoint=admin/test/'+id+'/delete', {method:'POST'});
    const d = await res.json();
    if(d.ok || d.deleted){
      allTests = allTests.filter(function(t){return (t.id||t.test_id)!==id;});
      filteredTests = allTests.slice();
      document.getElementById('cnt-tests').textContent = allTests.length;
      renderTests();
      toast('✅ O\'chirildi');
    } else { toast('❌ '+(d.error||'Xato')); }
  }catch(e){ toast('❌ Ulanish xatosi'); }
};

function doLogout(){
  clearSession();
  location.reload();
}
</script></body>
</html>
