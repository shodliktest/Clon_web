<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TestPro — Dashboard Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Unbounded:wght@700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#EEF1FF;--bg2:#E4E9FF;--card:#ffffff;--text:#161327;--text2:#635f7a;--text3:#9a96b3;
  --acc:#6C3FE8;--acc2:#C040C8;--acc3:#3fb6e8;--border:rgba(108,63,232,.12);
  --shadow:0 4px 24px rgba(108,63,232,.09);--glass:rgba(255,255,255,.6);
  --gold:#f5a623;--green:#12b76a;--red:#f04438;
}
[data-theme=dark]{
  --bg:#0b0716;--bg2:#120a24;--card:#171029;--text:#f1ecff;--text2:#a79fc9;--text3:#6f6791;
  --border:rgba(160,120,255,.16);--shadow:0 4px 28px rgba(0,0,0,.45);--glass:rgba(30,20,55,.55);
}
body{font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;background:var(--bg);color:var(--text);overflow-x:hidden;position:relative}

.aurora{position:fixed;inset:0;z-index:-2;overflow:hidden;background:var(--bg)}
.aurora::before,.aurora::after{content:'';position:absolute;width:60vmax;height:60vmax;border-radius:50%;filter:blur(80px);opacity:.35}
.aurora::before{background:radial-gradient(circle,var(--acc),transparent 65%);top:-20%;left:-15%;animation:drift1 22s ease-in-out infinite alternate}
.aurora::after{background:radial-gradient(circle,var(--acc3),transparent 65%);bottom:-25%;right:-15%;animation:drift2 26s ease-in-out infinite alternate}
[data-theme=dark] .aurora::before{opacity:.28}
[data-theme=dark] .aurora::after{opacity:.22}
@keyframes drift1{from{transform:translate(0,0) scale(1)}to{transform:translate(8%,10%) scale(1.15)}}
@keyframes drift2{from{transform:translate(0,0) scale(1)}to{transform:translate(-6%,-8%) scale(1.1)}}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:58px;z-index:500;
  display:flex;align-items:center;justify-content:space-between;padding:0 1rem;
  background:var(--glass);backdrop-filter:blur(20px) saturate(160%);border-bottom:1px solid var(--border)}
.logo{font-family:'Unbounded',sans-serif;font-size:1.15rem;font-weight:900;cursor:pointer;display:flex;align-items:center;gap:.4rem}
.logo-mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;box-shadow:0 2px 10px rgba(108,63,232,.4)}
.logo-txt{background:linear-gradient(135deg,var(--acc),var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-r{display:flex;align-items:center;gap:.4rem}
.ava{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));
  border:none;cursor:pointer;color:#fff;font-weight:900;font-size:.82rem;font-family:'Unbounded',sans-serif;
  overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 2px 10px rgba(108,63,232,.35)}
.ava img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ibtn{width:36px;height:36px;border-radius:99px;border:none;cursor:pointer;font-size:.9rem;
  background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;transition:all .25s}
[data-theme=dark] .ibtn{background:rgba(255,255,255,.08)}
.ibtn:hover{transform:rotate(15deg) scale(1.08)}
.mbtn{width:36px;height:36px;border-radius:11px;border:none;cursor:pointer;
  background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center}
[data-theme=dark] .mbtn{background:rgba(255,255,255,.08)}
.lines{display:flex;flex-direction:column;gap:4px;pointer-events:none}
.lines span{width:16px;height:2px;background:var(--text2);border-radius:2px;display:block}

/* MENU panel */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800;backdrop-filter:blur(2px)}
.ov.on{display:block}
.panel{position:fixed;top:0;right:-270px;width:250px;height:100vh;z-index:900;
  background:var(--card);border-left:1px solid var(--border);
  transition:right .32s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;box-shadow:-10px 0 40px rgba(0,0,0,.15)}
.panel.on{right:0}
.p-head{background:linear-gradient(135deg,var(--acc),var(--acc2));
  padding:1.2rem 1rem 1rem;display:flex;align-items:center;gap:.6rem;position:relative;min-height:92px;overflow:hidden}
.p-head::before{content:'';position:absolute;width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.12);top:-40px;right:-30px}
.p-ava{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.25);
  border:2px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#fff;font-size:.95rem;font-family:'Unbounded',sans-serif;flex-shrink:0;overflow:hidden;position:relative}
.p-ava img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.p-nm{font-size:.88rem;font-weight:800;color:#fff;margin-bottom:.14rem;position:relative}
.p-role{font-size:.7rem;color:rgba(255,255,255,.8);font-weight:600;position:relative}
.p-close{position:absolute;top:.7rem;right:.7rem;width:28px;height:28px;border-radius:8px;
  border:none;background:rgba(255,255,255,.22);cursor:pointer;color:#fff;font-size:.84rem;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.p-close:hover{background:rgba(255,255,255,.35);transform:rotate(90deg)}
.p-body{flex:1;overflow-y:auto;padding:.65rem .7rem}
.ml{display:flex;align-items:center;gap:.6rem;padding:.7rem .8rem;border-radius:12px;
  font-size:.83rem;font-weight:700;cursor:pointer;background:none;border:none;
  font-family:inherit;color:var(--text2);width:100%;text-align:left;transition:all .2s;margin-bottom:.2rem}
.ml:hover,.ml.on{background:rgba(108,63,232,.1);color:var(--acc);transform:translateX(3px)}
.ml .mi{width:20px;text-align:center;flex-shrink:0;font-size:.95rem}
.p-foot{padding:.75rem;border-top:1px solid var(--border)}
.lout{width:100%;padding:.68rem;border-radius:12px;border:1px solid rgba(239,68,68,.22);
  background:rgba(239,68,68,.07);color:#ef4444;font-weight:700;font-size:.83rem;
  cursor:pointer;font-family:inherit;transition:all .2s}
.lout:hover{background:rgba(239,68,68,.15)}

/* PAGE */
.page{padding:70px 0 3rem;max-width:640px;margin:0 auto}
.w{padding:0 1rem}

/* GREET */
.greet{padding:1rem 0 .6rem;display:flex;align-items:center;justify-content:space-between}
.greet-h{font-family:'Unbounded',sans-serif;font-size:1.15rem;font-weight:900;margin-bottom:.1rem}
.greet-p{font-size:.76rem;color:var(--text3)}
.greet-emoji{font-size:2rem;animation:wave 2.4s ease-in-out infinite}
@keyframes wave{0%,100%{transform:rotate(0deg)}25%{transform:rotate(14deg)}75%{transform:rotate(-8deg)}}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem;margin:.9rem 0 1.4rem}
.sb{background:var(--card);border-radius:16px;padding:.95rem .6rem;text-align:center;
  border:1px solid var(--border);box-shadow:var(--shadow);position:relative;overflow:hidden;transition:transform .25s}
.sb:hover{transform:translateY(-3px)}
.sb::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--acc),var(--acc2))}
.sv{font-family:'Unbounded',sans-serif;font-size:1.35rem;font-weight:900;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sl{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-top:.15rem}

/* SECTION */
.sec{margin-bottom:1.6rem}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.sec-t{font-size:.92rem;font-weight:800;display:flex;align-items:center;gap:.35rem}
.sec-new{padding:.35rem .8rem;border-radius:99px;font-size:.76rem;font-weight:700;
  cursor:pointer;border:none;font-family:inherit;
  background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;transition:all .22s}
.sec-new:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(108,63,232,.35)}
.see-all{font-size:.76rem;font-weight:700;color:var(--acc);cursor:pointer;
  background:none;border:1.5px solid rgba(108,63,232,.25);font-family:inherit;
  padding:.3rem .75rem;border-radius:99px;transition:all .2s}
.see-all:hover{background:rgba(108,63,232,.08)}

/* SCROLL CAROUSEL */
.scroll{display:flex;gap:.7rem;overflow-x:auto;padding-bottom:.4rem;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* CARD */
.card{min-width:172px;max-width:172px;flex-shrink:0;scroll-snap-align:start;
  background:var(--card);border-radius:18px;padding:.9rem;
  border:1.5px solid var(--border);box-shadow:var(--shadow);position:relative;z-index:0;overflow:visible;
  cursor:pointer;transition:transform .22s,box-shadow .22s;display:flex;flex-direction:column;
  opacity:0;animation:cardIn .5s ease forwards}
@keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(108,63,232,.2)}
.card.glow{isolation:isolate;overflow:hidden}
.card.glow::before{content:'';position:absolute;z-index:-1;
  top:50%;left:50%;width:320px;height:320px;margin:-160px 0 0 -160px;
  background:conic-gradient(from 0deg,transparent 0%,transparent 78%,var(--acc) 88%,var(--acc2) 94%,var(--acc3) 98%,transparent 100%);
  animation:cardSpin 3.5s linear infinite;will-change:transform}
.card.glow::after{content:'';position:absolute;inset:0;z-index:-1;background:var(--card);border-radius:16.5px;margin:2px}
@keyframes cardSpin{to{transform:rotate(360deg)}}

.card-icon{width:44px;height:44px;border-radius:13px;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:.6rem}
.card-t{font-size:.84rem;font-weight:800;color:var(--text);margin-bottom:.14rem;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.35;min-height:2.3em}
.card-au{font-size:.67rem;color:var(--text3);margin-bottom:.45rem;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chips{display:flex;gap:.28rem;flex-wrap:wrap;margin-bottom:.55rem}
.ch{display:inline-flex;align-items:center;padding:.15rem .4rem;border-radius:99px;
  font-size:.63rem;font-weight:700;background:rgba(108,63,232,.08);color:var(--acc);
  border:1px solid rgba(108,63,232,.12)}
[data-theme=dark] .ch{background:rgba(108,63,232,.22)}
.ch.gold{background:rgba(245,166,35,.12);color:#c47f0f}
.card-btn{display:block;width:100%;padding:.6rem;border-radius:11px;border:none;
  cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;
  font-family:inherit;font-size:.8rem;font-weight:700;text-align:center;transition:all .22s;margin-top:auto}

/* LIST ITEM */
.li{background:var(--card);border:1.5px solid var(--border);border-radius:15px;
  padding:.8rem .95rem;margin-bottom:.48rem;
  display:flex;align-items:center;gap:.65rem;cursor:pointer;transition:all .2s;
  opacity:0;animation:cardIn .4s ease forwards}
.li:hover{border-color:rgba(108,63,232,.35);transform:translateX(4px);box-shadow:0 6px 18px rgba(108,63,232,.13)}
.li-ico{width:38px;height:38px;border-radius:11px;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-nm{font-size:.85rem;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:.12rem}
.li-meta{font-size:.68rem;color:var(--text3);display:flex;gap:.4rem;flex-wrap:wrap;font-weight:600}
.li-acts{display:flex;gap:.25rem;flex-shrink:0}
.ab{width:31px;height:31px;border-radius:99px;border:1px solid var(--border);
  background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .22s}
.ab:hover{background:rgba(108,63,232,.1);border-color:rgba(108,63,232,.3);transform:scale(1.1)}

/* RESULT ITEM */
.ri{background:var(--card);border:1px solid var(--border);border-radius:13px;
  padding:.75rem .9rem;margin-bottom:.42rem;
  display:flex;align-items:center;justify-content:space-between;gap:.5rem;cursor:pointer;transition:all .2s;
  opacity:0;animation:cardIn .4s ease forwards}
.ri:hover{border-color:rgba(108,63,232,.28);transform:translateX(3px)}
.ri-info{min-width:0;flex:1}
.ri-nm{font-size:.84rem;font-weight:700;color:var(--text);margin-bottom:.1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-dt{font-size:.69rem;color:var(--text3)}
.ri-sc{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:900;flex-shrink:0}
.sc-g{color:var(--green)}.sc-a{color:var(--gold)}.sc-r{color:var(--red)}

/* QUICK ACTIONS & INTERFACE */
.qa-wrap{display:flex;flex-direction:column;gap:.5rem}
.qa{display:flex;align-items:center;justify-content:center;gap:.45rem;width:100%;
  padding:.85rem;border-radius:15px;font-family:inherit;font-size:.86rem;font-weight:700;
  cursor:pointer;border:none;transition:all .22s}
.qa-p{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
.qa-p:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(108,63,232,.35)}
.qa-s{background:var(--card);border:1.5px solid var(--border);color:var(--text2)}
.qa-s:hover{border-color:rgba(108,63,232,.4);color:var(--acc);transform:translateY(-2px)}

.sw{position:relative;display:inline-block;width:40px;height:22px}
.sw input{opacity:0;width:0;height:0}
.sw-s{position:absolute;cursor:pointer;inset:0;background:rgba(0,0,0,.15);border-radius:99px;transition:.3s}
.sw-s::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.sw input:checked+.sw-s{background:linear-gradient(135deg,var(--acc),var(--acc2))}
.sw input:checked+.sw-s::before{transform:translateX(18px)}

/* TOAST */
.toast{position:fixed;bottom:1.3rem;left:50%;transform:translateX(-50%);
  background:rgba(10,5,25,.92);color:#fff;padding:.65rem 1.1rem;border-radius:13px;
  font-size:.8rem;font-weight:600;z-index:9999;backdrop-filter:blur(14px);
  white-space:nowrap;animation:toastIn .35s both;box-shadow:0 10px 30px rgba(0,0,0,.3)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.sp{width:28px;height:28px;border:3px solid rgba(108,63,232,.15);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:1.6rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
.emp{text-align:center;padding:1.2rem;color:var(--text3);font-size:.8rem}

/* INTERAKTIV QUIZ MODAL */
.quiz-bg{display:none;position:fixed;inset:0;background:rgba(10,5,25,.6);backdrop-filter:blur(6px);
  z-index:2000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:1rem .6rem 2rem}
.quiz-bg.on{display:flex;animation:fadeIn .25s ease}
.quiz-box{background:var(--card);border-radius:24px;width:100%;max-width:520px;box-shadow:0 30px 80px rgba(0,0,0,.35);margin-top:1.2rem;overflow:hidden;animation:popIn .35s cubic-bezier(.2,.9,.3,1.2)}
.quiz-head{background:linear-gradient(135deg,var(--acc),var(--acc2));padding:1.1rem 1.3rem;color:#fff;position:relative}
.quiz-close{position:absolute;top:.8rem;right:.8rem;width:32px;height:32px;border-radius:10px;border:none;background:rgba(255,255,255,.22);color:#fff;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}
.quiz-title{font-family:'Unbounded',sans-serif;font-weight:800;font-size:1rem;margin-bottom:.3rem;padding-right:2.5rem}
.quiz-sub{font-size:.74rem;opacity:.85}
.qprog-track{height:6px;background:rgba(255,255,255,.25);border-radius:99px;margin-top:.8rem;overflow:hidden}
.qprog-fill{height:100%;background:#fff;border-radius:99px;transition:width .4s ease;width:0%}
.quiz-body{padding:1.4rem 1.3rem}
.q-num{display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;font-weight:800;color:var(--acc);background:rgba(108,63,232,.09);padding:.28rem .7rem;border-radius:99px;margin-bottom:.85rem}
.q-text{font-size:1rem;font-weight:700;line-height:1.5;margin-bottom:1.2rem;color:var(--text)}
.q-opts{display:flex;flex-direction:column;gap:.55rem}
.q-opt{display:flex;align-items:center;gap:.7rem;padding:.85rem 1rem;border-radius:14px;border:1.6px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;font-size:.86rem;font-weight:600;color:var(--text)}
.q-opt:hover{border-color:rgba(108,63,232,.4);background:rgba(108,63,232,.04);transform:translateX(3px)}
.q-opt .qletter{width:26px;height:26px;border-radius:8px;background:rgba(108,63,232,.1);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:800;flex-shrink:0}
.q-opt.sel{border-color:var(--acc);background:rgba(108,63,232,.08)}
.q-opt.sel .qletter{background:var(--acc);color:#fff}
.quiz-foot{padding:1rem 1.3rem 1.3rem;display:flex;gap:.6rem}
.qbtn{flex:1;padding:.85rem;border-radius:14px;border:none;cursor:pointer;font-family:inherit;font-size:.86rem;font-weight:700;transition:all .22s}
.qbtn-primary{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
.qbtn-primary:disabled{opacity:.45;cursor:not-allowed}
.qbtn-ghost{background:var(--bg);color:var(--text2)}

.result-wrap{padding:2rem 1.5rem;text-align:center}
.result-ring{width:120px;height:120px;margin:0 auto 1.2rem;position:relative;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:1.5rem;font-weight:900}
</style>
</head>
<body>

<div class="aurora"></div>

<header class="nav">
  <div class="logo" onclick="goTo('dashboard.html')">
    <div class="logo-mark">⚡</div>
    <span class="logo-txt">TestPro</span>
  </div>
  <div class="nav-r">
    <button class="ibtn" id="tbtn" title="Mavzuni o'zgartirish">🌙</button>
    <button class="ava" id="nav-ava" onclick="openMenu()">U</button>
    <button class="mbtn" id="mbtn">
      <div class="lines"><span></span><span></span><span></span></div>
    </button>
  </div>
</header>

<div class="ov" id="ov"></div>
<aside class="panel" id="panel">
  <div class="p-head">
    <button class="p-close" id="pcl">✕</button>
    <div class="p-ava" id="menu-ava">U</div>
    <div>
      <div class="p-nm" id="p-name">Yuklanmoqda...</div>
      <div class="p-role" id="p-role">Foydalanuvchi</div>
    </div>
  </div>
  <div class="p-body">
    <button class="ml on" onclick="closeMenu();goTo('dashboard.html')"><span class="mi">🏠</span>Bosh sahifa</button>
    <button class="ml" onclick="closeMenu();toast('Tez orada...')"><span class="mi">👤</span>Profil sozlamalari</button>
    <button class="ml" onclick="closeMenu();toast('Tez orada...')"><span class="mi">📜</span>Natijalar tarixi</button>
    <div id="admin-wrap"></div>
  </div>
  <div class="p-foot">
    <button class="lout" id="lout">🚪 Tizimdan chiqish</button>
  </div>
</aside>

<main class="page">
  <div class="w">
    
    <div class="greet">
      <div>
        <div class="greet-h" id="greet-h">Salom! 👋</div>
        <div class="greet-p">Bugun ham muvaffaqiyat sari bir qadam!</div>
      </div>
      <div class="greet-emoji">🚀</div>
    </div>

    <div class="stats">
      <div class="sb"><div class="sv" id="s-t">0</div><div class="sl">Testlarim</div></div>
      <div class="sb"><div class="sv" id="s-d">0</div><div class="sl">Ishlangan</div></div>
      <div class="sb"><div class="sv" id="s-a">—</div><div class="sl">O'rtacha</div></div>
    </div>

    <div class="sec">
      <div class="sec-hdr">
        <div class="sec-t">📝 Mening testlarim</div>
        <div style="display:flex;gap:.4rem;align-items:center">
          <button class="sec-new" onclick="goTo('create.html')">+ Yangi</button>
        </div>
      </div>
      <div id="my-tests"><div class="sp"></div></div>
    </div>

    <div class="sec" id="res-sec" style="display:none">
      <div class="sec-hdr">
        <div class="sec-t">🏆 So'nggi natijalar</div>
      </div>
      <div id="res-list"></div>
    </div>

    <div class="sec">
      <div class="sec-hdr">
        <div class="sec-t">🌐 Ommaviy testlar <span id="pub-cnt" style="color:var(--text3);font-size:.8rem;font-weight:500"></span></div>
      </div>
      <div id="pub-tests"><div class="sp"></div></div>
    </div>

    <div class="sec">
      <div class="sec-t" style="margin-bottom:.6rem">⚡ Tezkor harakatlar</div>
      <div class="qa-wrap">
        <button class="qa qa-p" onclick="goTo('create.html')">✏️ Yangi test yaratish</button>
      </div>
    </div>

    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px; padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;box-shadow:var(--shadow)">
      <span style="font-size:.78rem;color:var(--text3);font-weight:600">Interfeys rejimi (Tungi / Kunduzgi)</span>
      <label class="sw"><input type="checkbox" id="sw2"/><span class="sw-s"></span></label>
    </div>

  </div>
</main>

<div class="quiz-bg" id="quiz-bg">
  <div class="quiz-box" id="quiz-box">
    </div>
</div>

<script>
// 1. SUPABASE CLIENT SOZLAMALARI
const SUPABASE_URL = "https://omp.aistudy.uz"; // Yoki o'zingizning maxsus Supabase URL manzilingiz
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY"; // Loyihangizning haqiqiy Anon public kaliti

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let CURRENT_USER = null;
let ALL_LIVE_TESTS = [];

// 2. DETALIZATSIYA VA YORDAMCHI FUNKSIYALAR
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function goTo(url){location.href=url}

function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2400);
}

/* THEME CONTROLLER */
const TH={
  get(){return localStorage.getItem('tp_theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')},
  set(t){
    document.documentElement.setAttribute('data-theme',t);localStorage.setItem('tp_theme',t);
    const b=document.getElementById('tbtn');if(b)b.textContent=t==='dark'?'☀️':'🌙';
    const s2=document.getElementById('sw2');if(s2)s2.checked=t==='dark';
  },
  toggle(){this.set(this.get()==='dark'?'light':'dark')}
};
TH.set(TH.get());
document.getElementById('tbtn').onclick=()=>TH.toggle();
document.getElementById('sw2').onchange=()=>TH.toggle();

/* PANEL CONTROLLER */
const panel=document.getElementById('panel');const ov=document.getElementById('ov');
function openMenu(){panel.classList.add('on');ov.classList.add('on');}
function closeMenu(){panel.classList.remove('on');ov.classList.remove('on');}
document.getElementById('mbtn').onclick=openMenu;
document.getElementById('pcl').onclick=closeMenu;
ov.onclick=closeMenu;

document.getElementById('lout').onclick=async ()=>{
  await supabase.auth.signOut();
  toast('👋 Tizimdan chiqdingiz');
  setTimeout(()=>goTo('index.html'),600);
};

function setAva(id,name){
  const el=document.getElementById(id);if(!el)return;
  el.textContent=(name||'U')[0].toUpperCase();
}

// 3. APPLIKASIYA INITIALIZATION LOGIKASI
document.addEventListener('DOMContentLoaded', async () => {
  // Foydalanuvchini tekshirish
  const { data: { session }, error: authErr } = await supabase.auth.getSession();
  
  if (authErr || !session) {
    toast('⚠️ Iltimos avval tizimga kiring!');
    setTimeout(() => goTo('login.html'), 1000);
    return;
  }

  const user = session.user;
  const userEmail = user.email;
  const userName = user.user_metadata?.full_name || userEmail.split('@')[0];
  
  CURRENT_USER = { uid: user.id, name: userName, email: userEmail, is_admin: user.user_metadata?.is_admin || false };
  
  // UI'da foydalanuvchini aks ettirish
  document.getElementById('p-name').textContent = CURRENT_USER.name;
  document.getElementById('p-role').textContent = CURRENT_USER.is_admin ? '👑 Admin' : 'Foydalanuvchi';
  document.getElementById('greet-h').textContent = 'Salom, ' + CURRENT_USER.name.split(' ')[0] + '! 👋';
  setAva('nav-ava', CURRENT_USER.name);
  setAva('menu-ava', CURRENT_USER.name);

  if(CURRENT_USER.is_admin){
    document.getElementById('admin-wrap').innerHTML =
      `<button class="ml" style="color:var(--gold)" onclick="closeMenu();goTo('admin.html')">
        <span class="mi">👑</span> Admin Panel
      </button>`;
  }

  // Supabase dan real ma'lumotlarni oqim bo'ylab yuklash
  await loadDashboardData();
});

// 4. SUPABASE DATA FETCH ENGINE
async function loadDashboardData() {
  try {
    // A. 'tests' jadvalidan hamma ommaviy yoki foydalanuvchiga tegishli testlarni tortish
    const { data: tests, error: testErr } = await supabase
      .from('tests')
      .select('*')
      .order('created_at', { ascending: false });

    if (testErr) throw testErr;
    ALL_LIVE_TESTS = tests || [];

    // B. 'results' jadvalidan joriy foydalanuvchi yechgan imtihonlarni olish
    const { data: results, error: resErr } = await supabase
      .from('results')
      .select('*')
      .eq('user_id', CURRENT_USER.uid)
      .order('completed_at', { ascending: false });

    if (resErr) throw resErr;
    const myResults = results || [];

    // C. STATISTIKALARNI HISOBLASH VA CHIQARISH
    const myTestsArray = ALL_LIVE_TESTS.filter(t => t.creator_id === CURRENT_USER.uid);
    const publicTestsArray = ALL_LIVE_TESTS.filter(t => t.visibility === 'public');

    document.getElementById('s-t').textContent = myTestsArray.length;
    document.getElementById('s-d').textContent = myResults.length;
    
    if(myResults.length > 0) {
      const avg = Math.round(myResults.reduce((sum, r) => sum + (r.percentage || 0), 0) / myResults.length);
      document.getElementById('s-a').textContent = avg + '%';
    } else {
      document.getElementById('s-a').textContent = '—';
    }

    // D. MENING TESTLARIMNI RENDER QILISH
    renderMyTestsPanel(myTestsArray);

    // E. SO'NGGI NATIJALARNI RENDER QILISH
    renderRecentResultsPanel(myResults);

    // F. OMMAVIY TESTLARNI RENDER QILISH
    renderPublicTestsPanel(publicTestsArray);

  } catch (err) {
    console.error("Dashboard yuklashda xatolik:", err);
    document.getElementById('my-tests').innerHTML = `<div class="emp" style="color:var(--red)">Ma'lumot topilmadi yoki ulanishda xato.</div>`;
    document.getElementById('pub-tests').innerHTML = `<div class="emp" style="color:var(--red)">Xatolik yuz berdi.</div>`;
  }
}

// 5. DINAMIK UI RENDER FUNKSIYALARI
function renderMyTestsPanel(myTests) {
  const container = document.getElementById('my-tests');
  container.innerHTML = '';

  if(!myTests.length) {
    container.innerHTML = `<div class="emp">Siz hali test yaratmagansiz.<br><button onclick="goTo('create.html')" style="color:var(--acc);font-weight:700;background:none;border:none;cursor:pointer;font-size:.82rem;margin-top:.3rem">✏️ Yaratish →</button></div>`;
    return;
  }

  // Gorizontal scroll konteyner yaratish (Zip ichidagi o'ziga xos dizayn)
  const scrollDiv = document.createElement('div');
  scrollDiv.className = 'scroll';

  myTests.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'card glow';
    card.style.animationDelay = (i * 0.05) + 's';
    card.onclick = () => launchQuizEngine(t.id);

    card.innerHTML = `
      <div class="card-icon">📋</div>
      <div class="card-t">${esc(t.title)}</div>
      <div class="card-au">${t.visibility === 'public' ? '🌐 Ommaviy' : '🔒 Shaxsiy'} · ${t.questions?.length || 0} ta savol</div>
      <div class="chips">
        ${t.time_limit ? `<span class="ch">⏱ ${t.time_limit} daqiqa</span>` : ''}
      </div>
      <button class="card-btn">Boshlash →</button>
    `;
    scrollDiv.appendChild(card);
  });

  container.appendChild(scrollDiv);
}

function renderPublicTestsPanel(pubTests) {
  const container = document.getElementById('pub-tests');
  container.innerHTML = '';
  document.getElementById('pub-cnt').textContent = pubTests.length ? `(${pubTests.length} ta)` : '';

  if(!pubTests.length) {
    container.innerHTML = `<div class="emp">Hozircha ommaviy testlar mavjud emas.</div>`;
    return;
  }

  pubTests.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'li';
    row.style.animationDelay = (i * 0.04) + 's';
    row.onclick = () => launchQuizEngine(t.id);

    row.innerHTML = `
      <div class="li-ico">🌐</div>
      <div class="li-info">
        <div class="li-nm">${esc(t.title)}</div>
        <div class="li-meta">
          <span>📝 ${t.questions?.length || 0} ta savol</span>
          ${t.time_limit ? `<span>⏱ ${t.time_limit} daqiqa</span>` : ''}
        </div>
      </div>
      <div class="li-acts">
        <button class="ab">▶️</button>
      </div>
    `;
    container.appendChild(row);
  });
}

function renderRecentResultsPanel(results) {
  const sec = document.getElementById('res-sec');
  const container = document.getElementById('res-list');
  container.innerHTML = '';

  if(!results.length) {
    sec.style.display = 'none';
    return;
  }

  sec.style.display = 'block';
  // Eng so'nggi 4 ta natijani chiqarish
  results.slice(0, 4).forEach((r, i) => {
    const cls = r.percentage >= 80 ? 'sc-g' : r.percentage >= 50 ? 'sc-a' : 'sc-r';
    const dateStr = r.completed_at ? new Date(r.completed_at).toLocaleDateString('uz-UZ') : '';

    const div = document.createElement('div');
    div.className = 'ri';
    div.style.animationDelay = (i * 0.04) + 's';

    div.innerHTML = `
      <div class="ri-info">
        <div class="ri-nm">${esc(r.test_title)}</div>
        <div class="ri-dt">Yechilgan sana: ${dateStr}</div>
      </div>
      <div class="ri-sc ${cls}">${r.percentage}%</div>
    `;
    container.appendChild(div);
  });
}

// 6. INTERAKTIV MODAL IMTIHON DASTURI (QUIZ SYSTEM ENGINE)
let QUIZ_STATE = { test: null, idx: 0, answers: [] };

async function launchQuizEngine(testId) {
  const targetTest = ALL_LIVE_TESTS.find(t => t.id === testId);
  if(!targetTest || !targetTest.questions || !targetTest.questions.length) {
    toast("❌ Test yuklashda xatolik yoki savollar mavjud emas!");
    return;
  }

  QUIZ_STATE = {
    test: targetTest,
    idx: 0,
    answers: new Array(targetTest.questions.length).fill(null)
  };

  document.getElementById('quiz-bg').classList.add('on');
  renderQuizQuestion();
}

function closeQuizBox() {
  document.getElementById('quiz-bg').classList.remove('on');
}

function renderQuizQuestion() {
  const box = document.getElementById('quiz-box');
  const { test, idx, answers } = QUIZ_STATE;
  const q = test.questions[idx];
  const total = test.questions.length;
  const progressPercent = ((idx + 1) / total) * 100;
  const alphabet = ['A', 'B', 'C', 'D', 'E'];

  box.innerHTML = `
    <div class="quiz-head">
      <button class="quiz-close" onclick="closeQuizBox()">✕</button>
      <div class="quiz-title">${esc(test.title)}</div>
      <div class="quiz-sub">Jami savollar: ${total} ta</div>
      <div class="qprog-track"><div class="qprog-fill" style="width: ${progressPercent}%"></div></div>
    </div>
    <div class="quiz-body">
      <div class="q-num">Savol: ${idx + 1} / ${total}</div>
      <div class="q-text">${esc(q.question || q.text)}</div>
      <div class="q-opts" id="quiz-options-wrap"></div>
    </div>
    <div class="quiz-foot">
      <button class="qbtn qbtn-ghost" onclick="prevQuizQuestion()" ${idx === 0 ? 'disabled' : ''}>⬅️ Orqaga</button>
      <button class="qbtn qbtn-primary" id="quiz-action-btn" onclick="nextQuizQuestion()" ${answers[idx] === null ? 'disabled' : ''}>
        ${idx === total - 1 ? '🏁 Yakunlash' : 'Keyingisi ➡️'}
      </button>
    </div>
  `;

  const optsWrap = document.getElementById('quiz-options-wrap');
  // Variantlar (options/choices) massivini olish
  const optionsList = q.options || q.choices || [];
  
  optionsList.forEach((opt, i) => {
    const optDiv = document.createElement('div');
    optDiv.className = 'q-opt' + (answers[idx] === i ? ' sel' : '');
    optDiv.innerHTML = `<span class="qletter">${alphabet[i]}</span><span>${esc(opt)}</span>`;
    optDiv.onclick = () => selectQuizOption(i);
    optsWrap.appendChild(optDiv);
  });
}

function selectQuizOption(optionIdx) {
  QUIZ_STATE.answers[QUIZ_STATE.idx] = optionIdx;
  document.querySelectorAll('#quiz-options-wrap .q-opt').forEach((el, j) => el.classList.toggle('sel', j === optionIdx));
  document.getElementById('quiz-action-btn').disabled = false;
}

function prevQuizQuestion() {
  if(QUIZ_STATE.idx > 0) {
    QUIZ_STATE.idx--;
    renderQuizQuestion();
  }
}

async function nextQuizQuestion() {
  const { test, idx, answers } = QUIZ_STATE;
  if(idx < test.questions.length - 1) {
    QUIZ_STATE.idx++;
    renderQuizQuestion();
  } else {
    await processAndSaveQuizResults();
  }
}

async function processAndSaveQuizResults() {
  const box = document.getElementById('quiz-box');
  box.innerHTML = `<div class="sp"></div><p style="text-align:center;font-size:.85rem;padding-bottom:1.5rem;color:var(--text3)">Natija hisoblanmoqda va Supabase-ga saqlanmoqda...</p>`;

  const { test, answers } = QUIZ_STATE;
  let correctCount = 0;

  test.questions.forEach((q, i) => {
    // To'g'ri javob indeksini aniqlash (q.correct yoki q.correct_index)
    const correctAns = q.correct !== undefined ? q.correct : q.correct_index;
    if(answers[i] === correctAns) {
      correctCount++;
    }
  });

  const total = test.questions.length;
  const finalPercentage = Math.round((correctCount / total) * 100);

  try {
    // Supabase 'results' jadvaliga natijani yozish
    const { error } = await supabase
      .from('results')
      .insert([{
        user_id: CURRENT_USER.uid,
        test_id: test.id,
        test_title: test.title,
        correct_count: correctCount,
        total_questions: total,
        percentage: finalPercentage,
        completed_at: new Date().toISOString()
      }]);

    if (error) throw error;

    // Natija interfeysini vizual chiqarish
    const ringColor = finalPercentage >= 80 ? 'var(--green)' : finalPercentage >= 50 ? 'var(--gold)' : 'var(--red)';
    const feedbackMsg = finalPercentage >= 80 ? "A'lo natija! 🎉" : finalPercentage >= 50 ? "Yaxshi harakat! 👍" : "Yana biroz urinib ko'ring 💪";

    box.innerHTML = `
      <div class="result-wrap">
        <h2 style="font-family:'Unbounded';font-size:1.2rem;margin-bottom:1rem;color:linear-gradient(135deg,var(--acc),var(--acc2))">Imtihon Yakunlandi!</h2>
        <div class="result-ring" style="color:${ringColor}; border: 4px dashed ${ringColor}; border-radius: 50%;">
          ${finalPercentage}%
        </div>
        <p style="font-weight:700;font-size:1rem;margin-bottom:.4rem">${feedbackMsg}</p>
        <p style="font-size:.82rem;color:var(--text2);margin-bottom:1.5rem">${total} ta savoldan <b>${correctCount}</b> tasiga to'g'ri javob berdingiz.</p>
        <button class="qbtn qbtn-primary" style="width:100%" onclick="closeQuizBox(); loadDashboardData();">Dashboardga qaytish</button>
      </div>
    `;

  } catch (err) {
    console.error("Natijani saqlashda xato:", err);
    toast("❌ Natija bazaga saqlanmadi!");
    box.innerHTML = `
      <div class="result-wrap">
        <p style="color:var(--red);font-weight:700">Tizimga yozishda xatolik yuz berdi.</p>
        <button class="qbtn qbtn-ghost" style="width:100%;margin-top:1rem" onclick="closeQuizBox()">Yopish</button>
      </div>
    `;
  }
}
</script>
</body>
</html>
