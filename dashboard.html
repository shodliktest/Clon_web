<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TestPro — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=Unbounded:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}

/* ══════════════════════════════ TOKENS (index.html bilan bir oila) ══════════════════════════════ */
:root{
  --void:#0A0716; --panel:#161029; --glass:rgba(255,255,255,.045); --glass-2:rgba(255,255,255,.08);
  --line:rgba(255,255,255,.09); --ink:#F5F3FF; --ink-dim:#ABA5D9; --ink-faint:#726C9C;
  --violet:#8264FF; --violet-2:#5B3DE0; --magenta:#FF57D9; --amber:#FFB84D; --green:#34D399; --red:#FB7185;
  --grad: linear-gradient(135deg,var(--violet),var(--magenta));
  --grad-soft: linear-gradient(135deg,rgba(130,100,255,.16),rgba(255,87,217,.16));
  --shadow-card: 0 1px 2px rgba(0,0,0,.4), 0 12px 32px -12px rgba(91,61,224,.35);
  --bg:var(--void); --card:var(--panel); --text:var(--ink); --text2:var(--ink-dim); --text3:var(--ink-faint);
  --acc:var(--violet); --acc2:var(--magenta); --border:var(--line); --shadow:var(--shadow-card);
  --r-lg:22px; --r-md:16px; --r-sm:11px;
}
[data-theme=light]{
  --bg:#F4F2FF; --card:#FFFFFF; --text:#181325; --text2:#635C82; --text3:#9891B8;
  --acc:#6C3FE8; --acc2:#D6389F; --border:rgba(108,63,232,.12);
  --shadow:0 1px 2px rgba(108,63,232,.06), 0 10px 28px -10px rgba(108,63,232,.18);
  --glass:#fff; --glass-2:#fff; --line:rgba(108,63,232,.1);
}
body{font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;background:var(--bg);color:var(--text);
  overflow-x:hidden;transition:background .35s ease,color .35s ease}

.aurora{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
.aurora i{position:absolute;border-radius:50%;filter:blur(70px);opacity:.3;animation:drift 24s ease-in-out infinite alternate}
[data-theme=light] .aurora i{opacity:.18}
.aurora i:nth-child(1){width:44vw;height:44vw;background:var(--violet);top:-16vw;right:-12vw}
.aurora i:nth-child(2){width:34vw;height:34vw;background:var(--magenta);bottom:10vh;left:-10vw;animation-duration:28s;animation-delay:-8s}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-3vw,5vh) scale(1.1)}}
@media (prefers-reduced-motion:reduce){ .aurora i{animation:none} }

/* ══════════════════════════════ NAV ══════════════════════════════ */
.nav{position:fixed;top:0;left:0;right:0;height:58px;z-index:500;
  display:flex;align-items:center;justify-content:space-between;padding:0 1rem;
  background:color-mix(in srgb, var(--bg) 78%, transparent);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
.logo{font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:800;cursor:pointer;letter-spacing:-.02em;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-r{display:flex;align-items:center;gap:.5rem}
.ava{width:34px;height:34px;border-radius:50%;background:var(--grad);padding:2px;cursor:pointer;flex-shrink:0}
.ava-in{width:100%;height:100%;border-radius:50%;background:var(--panel);display:flex;align-items:center;
  justify-content:center;color:#fff;font-weight:800;font-size:.78rem;font-family:'Unbounded',sans-serif;overflow:hidden}
.ava-in img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ibtn{width:34px;height:34px;border-radius:99px;border:1px solid var(--line);cursor:pointer;font-size:.86rem;
  background:var(--glass);display:flex;align-items:center;justify-content:center;color:var(--text);transition:all .2s}
.ibtn:hover{border-color:var(--acc);transform:translateY(-1px)}
.mbtn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);cursor:pointer;background:var(--glass);
  display:flex;align-items:center;justify-content:center}
.lines{display:flex;flex-direction:column;gap:4px;pointer-events:none}
.lines span{width:15px;height:2px;background:var(--text2);border-radius:2px;display:block}

/* ══════════════════════════════ SIDE PANEL ══════════════════════════════ */
.ov{display:none;position:fixed;inset:0;background:rgba(3,1,10,.6);backdrop-filter:blur(3px);z-index:800}
.ov.on{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.panel{position:fixed;top:0;right:-270px;width:250px;height:100vh;z-index:900;
  background:var(--card);border-left:1px solid var(--line);
  transition:right .32s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
.panel.on{right:0}
.p-head{background:var(--grad);padding:1.2rem 1rem 1rem;display:flex;align-items:center;gap:.65rem;
  position:relative;min-height:90px;overflow:hidden}
.p-head::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 0%,rgba(255,255,255,.28),transparent 60%)}
.p-ava{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.55);
  display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:.92rem;
  font-family:'Unbounded',sans-serif;flex-shrink:0;overflow:hidden;position:relative;z-index:1}
.p-ava img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.p-nm{font-size:.87rem;font-weight:800;color:#fff;margin-bottom:.1rem;position:relative;z-index:1}
.p-role{font-size:.68rem;color:rgba(255,255,255,.85);font-weight:700;position:relative;z-index:1}
.p-close{position:absolute;top:.6rem;right:.6rem;width:27px;height:27px;border-radius:8px;z-index:2;
  border:none;background:rgba(255,255,255,.2);cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center}
.p-body{flex:1;overflow-y:auto;padding:.7rem .6rem}
.ml{display:flex;align-items:center;gap:.6rem;padding:.68rem .75rem;border-radius:12px;
  font-size:.82rem;font-weight:700;cursor:pointer;background:none;border:none;font-family:inherit;
  color:var(--text2);width:100%;text-align:left;transition:all .18s;margin-bottom:.2rem}
.ml:hover{background:var(--grad-soft);color:var(--acc)}
.ml.on{background:var(--grad-soft);color:var(--acc)}
.ml .mi{width:20px;text-align:center;flex-shrink:0;font-size:.94rem}
.p-foot{padding:.75rem;border-top:1px solid var(--line)}
.lout{width:100%;padding:.65rem;border-radius:12px;border:1px solid rgba(251,113,133,.25);
  background:rgba(251,113,133,.08);color:var(--red);font-weight:700;font-size:.82rem;cursor:pointer;
  font-family:inherit;transition:all .2s}
.lout:hover{background:rgba(251,113,133,.16)}

/* ══════════════════════════════ PAGE ══════════════════════════════ */
.page{padding:74px 0 3.5rem}
.w{padding:0 1.1rem}

/* ══════════════════════════════ HERO PROFILE ══════════════════════════════ */
.hero-card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);
  padding:1.3rem 1.2rem;margin-bottom:1.5rem;overflow:hidden;box-shadow:var(--shadow);
  opacity:0;animation:riseIn .6s .05s ease forwards}
@keyframes riseIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.hero-card::before{content:'';position:absolute;top:-40%;right:-20%;width:60%;height:180%;
  background:var(--grad-soft);border-radius:50%;filter:blur(30px);pointer-events:none}
.hero-top{display:flex;align-items:center;gap:.85rem;margin-bottom:1.15rem;position:relative}
.hero-ava{width:56px;height:56px;border-radius:50%;background:var(--grad);padding:2.5px;flex-shrink:0}
.hero-ava-in{width:100%;height:100%;border-radius:50%;background:var(--card);display:flex;align-items:center;
  justify-content:center;font-family:'Unbounded',sans-serif;font-weight:800;font-size:1.15rem;color:#fff;overflow:hidden}
.hero-ava-in img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hero-h{font-family:'Unbounded',sans-serif;font-size:1.08rem;font-weight:800;margin-bottom:.2rem;letter-spacing:-.01em}
.hero-p{font-size:.76rem;color:var(--text3);font-weight:600}

.stat-grid{display:grid;grid-template-columns:1fr 1fr auto;gap:.6rem;position:relative}
.sb{background:var(--glass);border:1px solid var(--line);border-radius:14px;padding:.75rem .5rem;text-align:center}
.sv{font-family:'Unbounded',sans-serif;font-size:1.15rem;font-weight:800;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sl{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-top:.15rem}

/* Animatsion progress halqasi — o'rtacha ball */
.ring-box{display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--glass);border:1px solid var(--line);border-radius:14px;padding:.5rem .65rem}
.ring-wrap{position:relative;width:52px;height:52px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--line);stroke-width:5}
.ring-fg{fill:none;stroke-width:5;stroke-linecap:round;stroke-dasharray:141;stroke-dashoffset:141;
  transition:stroke-dashoffset 1.1s cubic-bezier(.16,1,.3,1);stroke:url(#ringGrad)}
.ring-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Unbounded',sans-serif;font-size:.62rem;font-weight:800}
.ring-l{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-top:.3rem}

/* ══════════════════════════════ SECTION ══════════════════════════════ */
.sec{margin-bottom:1.6rem;opacity:0;transform:translateY(16px);transition:opacity .55s ease,transform .55s ease}
.sec.in{opacity:1;transform:translateY(0)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;gap:.5rem}
.sec-t{font-size:.9rem;font-weight:800;display:flex;align-items:center;gap:.4rem;letter-spacing:-.01em}
.sec-t span{font-size:.68rem;font-weight:600;color:var(--text3)}
.sec-r{display:flex;gap:.4rem;align-items:center;flex-shrink:0}
.sec-new{padding:.34rem .8rem;border-radius:99px;font-size:.73rem;font-weight:700;cursor:pointer;border:none;
  font-family:inherit;background:var(--grad);color:#fff;transition:all .2s;white-space:nowrap}
.sec-new:hover{transform:translateY(-1px);box-shadow:0 4px 14px -3px rgba(130,100,255,.5)}
.see-all{font-size:.73rem;font-weight:700;color:var(--acc);cursor:pointer;background:none;font-family:inherit;
  border:1.5px solid var(--line);padding:.3rem .75rem;border-radius:99px;transition:all .2s;white-space:nowrap}
.see-all:hover{border-color:var(--acc);background:var(--grad-soft)}

/* GROUP */
.grp{margin-bottom:1.5rem}
.grp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem}
.grp-l{display:flex;align-items:center;gap:.6rem}
.grp-icon{width:42px;height:42px;border-radius:13px;background:var(--glass);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.grp-nm{font-size:.85rem;font-weight:800;color:var(--text)}
.grp-ct{font-size:.68rem;color:var(--text3);font-weight:600}

.scroll{display:flex;gap:.75rem;overflow-x:auto;padding:4px 0 .5rem;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* CARD */
.card{min-width:168px;max-width:168px;flex-shrink:0;scroll-snap-align:start;position:relative;z-index:0;
  overflow:visible;background:var(--card);border-radius:var(--r-lg);padding:.95rem;
  border:1px solid var(--line);box-shadow:var(--shadow);cursor:pointer;
  transition:transform .28s cubic-bezier(.2,.8,.2,1),box-shadow .28s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 36px -14px rgba(130,100,255,.4)}
.card-icon{width:42px;height:42px;border-radius:12px;background:var(--grad-soft);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:.65rem}
.card-t{font-size:.83rem;font-weight:800;color:var(--text);margin-bottom:.16rem;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  line-height:1.35;min-height:2.3em}
.card-au{font-size:.66rem;color:var(--text3);margin-bottom:.5rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chips{display:flex;gap:.28rem;flex-wrap:wrap;margin-bottom:.65rem}
.ch{display:inline-flex;align-items:center;gap:.15rem;padding:.15rem .42rem;border-radius:99px;
  font-size:.61rem;font-weight:700;background:var(--grad-soft);color:var(--acc);border:1px solid var(--line)}
.card-btn{display:block;width:100%;padding:.58rem;border-radius:var(--r-sm);border:none;cursor:pointer;
  background:var(--grad);color:#fff;font-family:inherit;font-size:.78rem;font-weight:700;text-align:center;
  transition:all .2s;margin-top:auto}
.card-btn:hover{box-shadow:0 6px 16px -4px rgba(130,100,255,.5)}

.card.glow{isolation:isolate}
.card.glow::before{content:'';position:absolute;inset:-3px;z-index:-1;border-radius:calc(var(--r-lg) + 2px);
  background:conic-gradient(from 0deg,transparent 0deg,var(--violet) 45deg,var(--magenta) 90deg,transparent 150deg,transparent 360deg);
  animation:cardSpin 3.5s linear infinite;will-change:transform}
.card.glow::after{content:'';position:absolute;inset:0;z-index:-1;background:var(--card);border-radius:var(--r-lg);margin:3px}
@keyframes cardSpin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.card.glow::before{animation:none}}

/* LIST ITEM */
.li{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:.78rem .92rem;
  margin-bottom:.48rem;display:flex;align-items:center;gap:.6rem;cursor:pointer;transition:all .2s}
.li:hover{border-color:var(--acc);transform:translateX(3px);box-shadow:var(--shadow)}
.li-ico{width:38px;height:38px;border-radius:11px;background:var(--grad-soft);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-nm{font-size:.83rem;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:.12rem}
.li-meta{font-size:.66rem;color:var(--text3);display:flex;gap:.4rem;flex-wrap:wrap}
.li-btn{padding:.32rem .72rem;border-radius:9px;border:none;cursor:pointer;background:var(--grad);color:#fff;
  font-family:inherit;font-size:.7rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.li-acts{display:flex;gap:.22rem;flex-shrink:0}
.ab{width:29px;height:29px;border-radius:9px;border:1px solid var(--line);background:var(--glass);
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.76rem;transition:all .2s;color:var(--text)}
.ab:hover{border-color:var(--acc);background:var(--grad-soft)}
.ab-del{background:rgba(251,113,133,.08);border-color:rgba(251,113,133,.25)}
.ab-del:hover{background:rgba(251,113,133,.18)}

.vtag{display:inline-block;padding:.08rem .4rem;border-radius:99px;font-size:.58rem;font-weight:700;margin-left:.2rem}
.vt-pub{background:rgba(52,211,153,.13);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.vt-priv{background:rgba(255,184,77,.13);color:var(--amber);border:1px solid rgba(255,184,77,.28)}
.vt-code{background:var(--grad-soft);color:var(--acc);border:1px solid var(--line)}

/* RESULT ITEM */
.ri{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:.72rem .88rem;
  margin-bottom:.44rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;
  cursor:pointer;transition:all .2s}
.ri:hover{border-color:var(--acc);transform:translateX(3px)}
.ri-nm{font-size:.82rem;font-weight:700;color:var(--text);margin-bottom:.12rem;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-dt{font-size:.66rem;color:var(--text3)}
.ri-sc{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:800;flex-shrink:0;padding:.25rem .6rem;border-radius:10px}
.sc-g{color:var(--green);background:rgba(52,211,153,.1)}
.sc-a{color:var(--amber);background:rgba(255,184,77,.1)}
.sc-r{color:var(--red);background:rgba(251,113,133,.1)}

.back-btn{display:flex;align-items:center;gap:.4rem;padding:.42rem .8rem;margin-bottom:.85rem;
  border-radius:10px;border:1px solid var(--line);background:var(--glass);cursor:pointer;font-size:.8rem;
  font-weight:700;color:var(--text2);width:fit-content;transition:all .2s}
.back-btn:hover{border-color:var(--acc);color:var(--acc)}

/* QUICK ACTIONS */
.qa-wrap{display:flex;flex-direction:column;gap:.5rem}
.qa{display:flex;align-items:center;justify-content:center;gap:.45rem;width:100%;padding:.8rem;
  border-radius:14px;font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.qa-p{background:var(--grad);color:#fff;box-shadow:0 4px 16px -4px rgba(130,100,255,.5)}
.qa-p:hover{transform:translateY(-2px);box-shadow:0 8px 22px -4px rgba(130,100,255,.6)}
.qa-s{background:var(--card);border:1px solid var(--line);color:var(--text2)}
.qa-s:hover{border-color:var(--acc);color:var(--acc)}

.pref-row{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:.75rem 1.05rem;
  display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}

/* CODE MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(3,1,10,.65);backdrop-filter:blur(4px);
  z-index:1000;align-items:center;justify-content:center;padding:1rem}
.modal-bg.on{display:flex;animation:fadeIn .2s ease}
.modal{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:1.4rem;
  width:100%;max-width:300px;box-shadow:0 30px 70px rgba(0,0,0,.4)}
.ci{width:36px;height:44px;text-align:center;font-family:'Unbounded',sans-serif;font-weight:800;font-size:1.05rem;
  border:2px solid var(--line);border-radius:10px;background:var(--glass);color:var(--text);outline:none;transition:border-color .2s}
.ci:focus{border-color:var(--acc)}

/* SWITCH */
.sw{position:relative;display:inline-block;width:40px;height:21px}
.sw input{opacity:0;width:0;height:0}
.sw-s{position:absolute;cursor:pointer;inset:0;background:var(--line);border-radius:99px;transition:.3s}
.sw-s::before{content:'';position:absolute;width:15px;height:15px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.sw input:checked+.sw-s{background:var(--grad)}
.sw input:checked+.sw-s::before{transform:translateX(19px)}

.toast{position:fixed;bottom:1.3rem;left:50%;transform:translateX(-50%);background:var(--panel);color:#fff;
  padding:.6rem 1.05rem;border-radius:12px;font-size:.78rem;font-weight:600;z-index:9999;
  border:1px solid var(--line);backdrop-filter:blur(14px);white-space:nowrap;animation:fau .3s ease both}
@keyframes fau{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.sp{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--acc);border-radius:50%;
  animation:spin .7s linear infinite;margin:2rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
.emp{text-align:center;padding:1.1rem;color:var(--text3);font-size:.8rem}
.err{color:var(--red);font-size:.8rem;text-align:center;padding:1.1rem}
.divider{height:1px;background:var(--line);margin:.65rem 0}
</style>
</head>
<body>

<div class="aurora"><i></i><i></i></div>

<nav class="nav">
  <div class="logo" onclick="goTo('index.html')">TestPro</div>
  <div class="nav-r">
    <div class="ava" id="nav-ava" onclick="goTo('profile.html')"><div class="ava-in">?</div></div>
    <button class="ibtn" id="tbtn">☀️</button>
    <button class="mbtn" id="mbtn"><div class="lines"><span></span><span></span><span></span></div></button>
  </div>
</nav>

<div class="ov" id="ov"></div>
<div class="panel" id="panel">
  <div class="p-head">
    <div class="p-ava" id="p-ava">?</div>
    <div>
      <div class="p-nm" id="p-nm">...</div>
      <div class="p-role" id="p-role">Foydalanuvchi</div>
    </div>
    <button class="p-close" id="pcl">✕</button>
  </div>
  <div class="p-body">
    <button class="ml on" onclick="closeMenu()"><span class="mi">📊</span> Dashboard</button>
    <button class="ml" onclick="closeMenu();goTo('create.html')"><span class="mi">✏️</span> Yangi test</button>

const SecReveal = new IntersectionObserver((es)=>{
  es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); SecReveal.unobserve(e.target); } });
},{threshold:.1});

function animateRing(pct){
  const CIRC=140.74;
  const fg=document.getElementById('ring-fg'), txt=document.getElementById('ring-txt');
  const clamped=Math.max(0,Math.min(100,pct));
  requestAnimationFrame(()=>{ fg.style.strokeDashoffset = CIRC - (CIRC*clamped/100); });
  const dur=1000,t0=performance.now();
  function step(t){
    const p=Math.min(1,(t-t0)/dur), eased=1-Math.pow(1-p,3);
    txt.textContent=Math.round(clamped*eased)+'%';
    if(p<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

const Carousel = (()=>{
  const items = new Set();
  let timer = null;
  function pause(el){ el._pausedUntil = Date.now() + 3500; }
  function cloneForLoop(el){
    const originals = Array.from(el.children);
    if (originals.length < 2 || el._cloned) return;
    originals.forEach(c => {
      const clone = c.cloneNode(true);
      clone.onclick = c.onclick;
      const btns=clone.querySelectorAll('.ab,.li-btn');
      const obtns=c.querySelectorAll('.ab,.li-btn');
      btns.forEach((b,i)=>{ if(obtns[i]) b.onclick=obtns[i].onclick; });
      el.appendChild(clone);
    });
    el._cloned = true;
  }
  function register(el){
    el._pausedUntil = 0;
    cloneForLoop(el);
    ['pointerdown','wheel','touchstart'].forEach(ev=>el.addEventListener(ev,()=>pause(el),{passive:true}));
    el.addEventListener('scroll', ()=>{ if(!el._auto) pause(el); }, {passive:true});
    items.add(el);
    if(!timer) timer = setInterval(tick, 5000);
  }
  function tick(){
    const now = Date.now();
    for(const el of Array.from(items)){
      if(!el.isConnected){ items.delete(el); continue; }
      if(now < (el._pausedUntil||0)) continue;
      const card = el.querySelector('.card');
      if(!card) continue;
      const gap = parseFloat(getComputedStyle(el).columnGap || getComputedStyle(el).gap) || 10;
      const step = card.offsetWidth + gap;
      if (el._cloned && el._realWidth == null) {
        const n = el.children.length / 2;
        if (n > 0 && el.children[n]) el._realWidth = el.children[n].offsetLeft - el.children[0].offsetLeft;
      }
      const maxScroll = el.scrollWidth - el.clientWidth;
      if (maxScroll <= 4) continue;
      el._auto = true;
      el.scrollBy({left: step, behavior:'smooth'});
      setTimeout(()=>{
        if (el._realWidth && el.scrollLeft >= el._realWidth - 2) el.scrollLeft -= el._realWidth;
        el._auto=false;
      }, 650);
    }
  }
  return { register };
})();

let CU=null,UID='',_myTests=[],_allResults=[];

(async()=>{
  CU=await AuthHelpers.requireAuth('login.html');
  if(!CU)return;
  UID=String(CU.id||CU.uid||CU._tg_id||'');
  const name=[CU.first_name,CU.last_name].filter(Boolean).join(' ')||CU.name||'Foydalanuvchi';

  let ud=null;
  try{ud=await DB.getUser(UID);}catch(e){}
  const isAdmin_=!!(ud?.is_admin||ud?.role==='admin');

  document.querySelector('#nav-ava .ava-in').textContent=(name||'U')[0].toUpperCase();
  if(CU?.photo_url) document.querySelector('#nav-ava .ava-in').innerHTML=`<img src="${CU.photo_url}" alt=""/>`;
  document.getElementById('hero-ava').textContent=(name||'U')[0].toUpperCase();

  setAva('p-ava',CU,name);

  document.getElementById('p-nm').textContent=name;
  document.getElementById('p-role').textContent=isAdmin_?'👑 Admin':'Foydalanuvchi';
  document.getElementById('greet-h').textContent='Salom, '+name.split(' ')[0]+'! 👋';

  if(isAdmin_){
    document.getElementById('admin-wrap').innerHTML=
      `<button class="ml" style="color:var(--amber)" onclick="closeMenu();goTo('admin.html')"><span class="mi">👑</span> Admin panel</button>`;
  }

  const myWrap=document.getElementById('my-tests');
  try{
    _myTests=await DB.getMyTests(UID);
    document.getElementById('s-t').textContent=_myTests.length;
    if(!_myTests.length){
      myWrap.innerHTML=`<div class="emp">Test yaratilmagan.
        <br><button onclick="goTo('create.html')" style="color:var(--acc);font-weight:700;background:none;border:none;cursor:pointer;font-size:.8rem;margin-top:.3rem">✏️ Yaratish →</button>
      </div>`;
    } else {
      renderMyTests(false);
      if(_myTests.length>1){
        const btn=document.getElementById('my-see-all');
        btn.style.display='';
        btn.onclick=()=>renderMyTests(true);
      }
    }
  }catch(e){myWrap.innerHTML=`<div class="err">❌ ${e.message}</div>`;}

  try{
    _allResults=await DB.getMyResults(UID,0);
    document.getElementById('s-d').textContent=_allResults.length;
    if(_allResults.length){
      const avg=Math.round(_allResults.reduce((s,r)=>s+(r.percentage||r.score||0),0)/_allResults.length);
      animateRing(avg);
      document.getElementById('res-sec').style.display='block';
      SecReveal.observe(document.getElementById('res-sec'));
      renderResults(false);
      document.getElementById('res-see-all').onclick=()=>renderResults(true);
    } else { animateRing(0); }
  }catch(e){ animateRing(0); }

  const pubWrap=document.getElementById('pub-tests');
  try{
    const all=await DB.getPublicTests();
    const pub=(all||[]).filter(t=>t.visibility==='public');

    if(!pub.length){pubWrap.innerHTML='<div class="emp">Ommaviy test yo\'q</div>';return;}

    pubWrap.innerHTML='';
    window._pubGrps=grps;
    renderPubGroups(pubWrap, grps);
  }catch(e){pubWrap.innerHTML=`<div class="err">❌ ${e.message}</div>`;}
})();

    const hdr=document.createElement('div');hdr.className='grp-hdr';

  back.onclick=()=>renderMyTests(false);

      <div><div class="grp-nm">${esc(sub.label||cat)}</div><div class="grp-ct">${arr.length} ta test</div></div>
    </div>`;
  wrap.appendChild(hdr);
  arr.forEach(t=>wrap.appendChild(buildMyListItem(t,!!(window._isAdmin))));

  back.innerHTML='← Barcha fanlar';
  back.onclick=()=>showMyCats(wrap, btn);

function renderResults(showAll){
  const wrap=document.getElementById('res-list');
  const btn=document.getElementById('res-see-all');
  const list=showAll?_allResults:_allResults.slice(0,3);
  wrap.innerHTML='';
  list.forEach(r=>{
    const pct=Math.round(r.percentage||r.score||0);
    const cls=pct>=80?'sc-g':pct>=50?'sc-a':'sc-r';
    const d=r.completedAt?new Date(r.completedAt):null;
    const ds=d?d.toLocaleDateString('uz-UZ',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('uz-UZ',{hour:'2-digit',minute:'2-digit'}):'';
    const el=document.createElement('div');el.className='ri';
    el.innerHTML=`
      <div style="flex:1;min-width:0">
        <div class="ri-nm">${esc(r.testTitle||r.testId||'Test')}</div>
        <div class="ri-dt">${ds} · ${r.correct||0}/${r.total||0}</div>
      </div>
      <div class="ri-sc ${cls}">${pct}%</div>`;
    wrap.appendChild(el);
  });
  if(showAll){
    const back=document.createElement('button');
    back.className='back-btn';back.style.marginTop='.5rem';
    back.innerHTML='← Yopish';
    back.onclick=()=>renderResults(false);
    wrap.appendChild(back);
  }
  if(btn){ btn.textContent=showAll?'← Yopish':'Barchasi →'; btn.onclick=()=>renderResults(!showAll); }
}

function renderPubGroups(container, grps){
  container.innerHTML='';
  Object.entries(grps).forEach(([s,a])=>{
    const sb=getSubject(s);const ic=ICON[s]||getIco(s)||'📚';
    const g=document.createElement('div');g.className='grp';
    const h=document.createElement('div');h.className='grp-hdr';
    h.innerHTML=`
      <div class="grp-l">
        <div class="grp-icon">${ic}</div>
        <div><div class="grp-nm">${esc(sb.label)}</div><div class="grp-ct">${a.length} ta test</div></div>
      </div>
      <button class="see-all">Barchasi →</button>`;
    h.querySelector('.see-all').onclick=()=>showPubList(container,s,a,ic,sb,grps);
    g.appendChild(h);
    const sc=document.createElement('div');sc.className='scroll carousel';
    a.forEach(t=>sc.appendChild(buildCard(t,ic)));g.appendChild(sc);
    container.appendChild(g);
    Carousel.register(sc);
  });
}

function showPubList(container, subj, arr, icon, sub, grps){
  container.innerHTML='';
  const hdr=document.createElement('div');hdr.className='grp-hdr';
  hdr.innerHTML=`
    <div class="grp-l">
      <div class="grp-icon">${icon}</div>
      <div><div class="grp-nm">${esc(sub.label)}</div><div class="grp-ct">${arr.length} ta test</div></div>
    </div>`;
  container.appendChild(hdr);
  arr.forEach(t=>container.appendChild(buildListItem(t,icon)));
  const back=document.createElement('button');
  back.className='back-btn';back.style.marginTop='.5rem';
  back.innerHTML='← Orqaga';
  back.onclick=()=>renderPubGroups(container,grps);
  container.appendChild(back);
}
</script>
